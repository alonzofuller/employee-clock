function AppTimeKeeper({sessions,costs,onSessionAction,onCostAction,tick}) {
  const [newApp,setNewApp]=useState('');
  const [newCostName,setNewCostName]=useState('');
  const [newCostAmt,setNewCostAmt]=useState('');
  const [newCostPeriod,setNewCostPeriod]=useState('monthly');

  function getAppElapsed(s) {
    if(!s.isRunning&&!s.isPaused)return 0;
    const now=Date.now();
    if(s.isRunning)return Math.max(0,(now-s.startTime-(s.totalPausedMs||0))/1000);
    return Math.max(0,(s.pauseStartTime-s.startTime-(s.totalPausedMs||0))/1000);
  }
  function getAppTotal(s){return(s.savedSec||0)+getAppElapsed(s);}
  const activeSessions=sessions.filter(s=>s.isRunning||s.isPaused);
  const finishedSessions=sessions.filter(s=>!s.isRunning&&!s.isPaused);
  const todaySec=sessions.filter(s=>s.date===getCTDateStr()).reduce((sum,s)=>sum+getAppTotal(s),0);
  const weekSec=sessions.filter(s=>getCTWeekStr(new Date(s.date))===getCTWeekStr()).reduce((sum,s)=>sum+getAppTotal(s),0);
  const monthSec=sessions.filter(s=>s.date&&s.date.startsWith(getCTMonthStr())).reduce((sum,s)=>sum+getAppTotal(s),0);
  const todayEarnings=(todaySec/3600)*DEV_RATE;
  const appMap={};
  sessions.forEach(s=>{const k=s.appName;appMap[k]=(appMap[k]||0)+getAppTotal(s);});
  const topApps=Object.entries(appMap).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const monthlyTotal=costs.reduce((s,c)=>s+(c.period==='monthly'?c.cost:c.cost/12),0);
  const annualTotal=costs.reduce((s,c)=>s+(c.period==='annual'?c.cost:c.cost*12),0);

  return(
    <div className="app-section">
      <div className="app-section-header">
        <div><div className="app-section-title">App Development Time Keeper</div><div className="app-section-brand">ProGuide Tech Solutions</div></div>
        <span style={{fontSize:'.72rem',color:'rgba(255,255,255,.5)'}}>{activeSessions.length} active session{activeSessions.length!==1?'s':''}</span>
      </div>
      <div className="app-grid">
        <div className="app-col">
          <div className="app-col-title">Active Sessions</div>
          <div className="app-new-row">
            <input className="app-new-input" placeholder="App / project name…" value={newApp} onChange={e=>setNewApp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&newApp.trim()&&onSessionAction('start',null,newApp)} />
            <button className="btn btn-green btn-sm" onClick={()=>newApp.trim()&&onSessionAction('start',null,newApp)}>+ Start</button>
          </div>
          {activeSessions.length===0&&<div style={{color:'var(--gray)',fontSize:'.8rem',fontStyle:'italic',padding:'8px 0'}}>No active sessions. Start one above.</div>}
          {activeSessions.map(s=>(
            <div key={s.id} className="app-session-card">
              <div className="app-session-name">{s.appName}</div>
              <div className={`app-session-timer ${s.isPaused?'paused':''}`}>{fmtSec(getAppTotal(s))}</div>
              <div className="app-session-actions">
                {s.isRunning&&<button className="btn btn-yellow btn-sm" onClick={()=>onSessionAction('pause',s.id)}>⏸ Pause</button>}
                {s.isPaused&&<button className="btn btn-green btn-sm" onClick={()=>onSessionAction('resume',s.id)}>▶ Resume</button>}
                <button className="btn btn-red btn-sm" onClick={()=>onSessionAction('stop',s.id)}>⏹ Stop</button>
              </div>
              <div style={{fontSize:'.65rem',color:'var(--gray)',marginTop:4}}>{s.isRunning?'Running':'Paused'} · {fmtHM(getAppTotal(s))} · {fmtMoney((getAppTotal(s)/3600)*DEV_RATE)}</div>
            </div>
          ))}
          {finishedSessions.length>0&&(
            <div>
              <div style={{fontSize:'.68rem',color:'var(--gray)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',margin:'12px 0 6px'}}>Completed</div>
              {finishedSessions.slice(-5).reverse().map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:'.78rem'}}>
                  <div><span style={{fontWeight:600,color:'var(--navy)'}}>{s.appName}</span><span style={{color:'var(--gray)',marginLeft:8,fontSize:'.7rem'}}>{s.date}</span></div>
                  <span style={{color:'var(--gray)'}}>{fmtHM(getAppTotal(s))}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="app-col">
          <div className="app-col-title">Hours Tracked</div>
          {[{label:'Today',val:fmtHM(todaySec)},{label:'This Week',val:fmtHM(weekSec)},{label:'This Month',val:fmtHM(monthSec)}].map(r=>(
            <div key={r.label} className="stat-card"><span className="stat-card-label">{r.label}</span><span className="stat-card-value">{r.val}</span></div>
          ))}
          <div className="stat-card"><span className="stat-card-label">Today's Earnings @ ${DEV_RATE}/hr</span><span className="stat-card-value earnings">{fmtMoney(todayEarnings)}</span></div>
          <div style={{marginTop:16,padding:'12px',background:'var(--gray-bg)',borderRadius:'var(--radius-sm)'}}>
            <div style={{fontSize:'.7rem',color:'var(--gray)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Weekly Breakdown</div>
            {['Monday','Tuesday','Wednesday','Thursday','Friday'].map(d=>{
              const daySec=sessions.filter(s=>{try{return new Date(s.date).toLocaleDateString('en-US',{timeZone:TZ,weekday:'long'})===d;}catch(e){return false;}}).reduce((sum,s)=>sum+getAppTotal(s),0);
              return(<div key={d} style={{display:'flex',justifyContent:'space-between',fontSize:'.78rem',padding:'3px 0'}}><span style={{color:'var(--gray)'}}>{d.slice(0,3)}</span><span style={{fontWeight:600,color:daySec>0?'var(--navy)':'#d1d5db'}}>{fmtHM(daySec)}</span></div>);
            })}
          </div>
        </div>

        <div className="app-col">
          <div className="app-col-title">App Summary</div>
          {topApps.length===0?<div style={{color:'var(--gray)',fontSize:'.8rem',fontStyle:'italic'}}>No data yet</div>:topApps.map(([name,sec])=>(
            <div key={name} className="app-summary-row"><div><div className="app-summary-name">{name}</div><div className="app-summary-hours">{fmtHM(sec)}</div></div><div className="app-summary-earn">{fmtMoney((sec/3600)*DEV_RATE)}</div></div>
          ))}
          <div style={{height:16}} />
          <div className="app-col-title">Tool Subscriptions</div>
          {costs.map(c=>(
            <div key={c.id} className="cost-row">
              <div><div className="cost-name">{c.name}</div><div className="cost-period">{c.period}</div></div>
              <div style={{display:'flex',alignItems:'center',gap:8}}><span className="cost-amount">{fmtMoney(c.cost)}</span><button onClick={()=>onCostAction('remove',c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'.75rem'}}>✕</button></div>
            </div>
          ))}
          <div className="cost-total"><span style={{color:'var(--gray)'}}>Monthly Total:</span><span style={{color:'var(--red)'}}>{fmtMoney(monthlyTotal)}/mo</span></div>
          <div className="cost-total" style={{paddingTop:4,borderTop:'none',fontSize:'.72rem'}}><span style={{color:'var(--gray)'}}>Annual:</span><span style={{color:'#6b7280'}}>{fmtMoney(annualTotal)}/yr</span></div>
          <div className="cost-add-row">
            <input className="cost-input" placeholder="Subscription name" value={newCostName} onChange={e=>setNewCostName(e.target.value)} />
            <div className="cost-input-row">
              <input className="cost-input" style={{flex:1}} placeholder="Cost $" type="number" step="0.01" value={newCostAmt} onChange={e=>setNewCostAmt(e.target.value)} />
              <select className="cost-input" value={newCostPeriod} onChange={e=>setNewCostPeriod(e.target.value)}><option value="monthly">Monthly</option><option value="annual">Annual</option></select>
            </div>
            <button className="btn btn-navy btn-sm" onClick={()=>{if(!newCostName.trim()||!newCostAmt)return;onCostAction('add',null,{name:newCostName.trim(),cost:parseFloat(newCostAmt),period:newCostPeriod});setNewCostName('');setNewCostAmt('');}}>+ Add Subscription</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================== EMPLOYEE EDIT MODAL ====================
function EmployeeEditModal({timer,onClose,onSave}) {
  const [editData,setEditData]=useState({
    name:timer.name||'',
    title:timer.title||'',
    hourlyWage:timer.hourlyWage||0,
    wageType:timer.wageType||'hourly',
    hireDate:timer.hireDate||'',
    isExempt:timer.isExempt||false,
    profileImage:timer.profileImage||null,
    assignedHours:{...(timer.assignedHours||STD_SCHED)},
  });
  const [imagePreview,setImagePreview]=useState(timer.profileImage||null);

  function handleImageUpload(e) {
    const file=e.target.files[0];
    if(file){
      const reader=new FileReader();
      reader.onload=ev=>{setImagePreview(ev.target.result);setEditData(p=>({...p,profileImage:ev.target.result}));};
      reader.readAsDataURL(file);
    }
  }

  function handleRemoveImage() {
    setImagePreview(null);
    setEditData(p=>({...p,profileImage:null}));
  }

  function handleSave() {
    onSave(timer.id,editData);
    onClose();
  }

  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const initials=timer.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Edit Employee Details</div>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="emp-edit-modal-body">
          {/* Header with Avatar */}
          <div className="emp-edit-header">
            <div className="emp-avatar-large">
              {imagePreview?<img src={imagePreview} alt={timer.name} />:initials}
            </div>
            <div className="emp-edit-name-section">
              <input className="emp-edit-name-input" value={editData.name} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} placeholder="Employee Name" />
              <input className="emp-edit-title-input" value={editData.title} onChange={e=>setEditData(p=>({...p,title:e.target.value}))} placeholder="Job Title / Role" />
            </div>
          </div>

          {/* Profile Picture Upload */}
          <div className="emp-edit-section">
            <div className="emp-edit-section-title">Profile Picture</div>
            <div className="emp-avatar-upload">
              <div className="emp-avatar-preview">
                {imagePreview?<img src={imagePreview} alt="Preview" />:initials}
              </div>
              <label className="emp-avatar-btn">Upload Photo<input type="file" accept="image/*" onChange={handleImageUpload} style={{display:'none'}} /></label>
              {imagePreview&&<button className="emp-avatar-remove" onClick={handleRemoveImage}>Remove</button>}
            </div>
          </div>

          {/* Basic Info */}
          <div className="emp-edit-section">
            <div className="emp-edit-section-title">Employment Information</div>
            <div className="emp-edit-row">
              <div className="emp-edit-field">
                <label className="emp-edit-label">Hire Date</label>
                <input className="emp-edit-input-full" type="date" value={editData.hireDate} onChange={e=>setEditData(p=>({...p,hireDate:e.target.value}))} />
              </div>
              <div className="emp-edit-field">
                <label className="emp-edit-label">Employment Type</label>
                <select className="emp-edit-input-full" value={editData.isExempt?'exempt':'non-exempt'} onChange={e=>setEditData(p=>({...p,isExempt:e.target.value==='exempt'}))}>
                  <option value="non-exempt">Non-Exempt (Hourly)</option>
                  <option value="exempt">Exempt (Salary)</option>
                </select>
              </div>
            </div>
          </div>

          {/* Pay Settings */}
          <div className="emp-edit-section">
            <div className="emp-edit-section-title">Pay Settings</div>
            <div className="emp-edit-row">
              <div className="emp-edit-field">
                <label className="emp-edit-label">Pay Type</label>
                <select className="emp-edit-input-full" value={editData.wageType} onChange={e=>setEditData(p=>({...p,wageType:e.target.value}))}>
                  <option value="hourly">Hourly</option>
                  <option value="flat">Flat Rate (per shift)</option>
                </select>
              </div>
              <div className="emp-edit-field">
                <label className="emp-edit-label">{editData.wageType==='flat'?'Rate per Shift':'Hourly Rate ($)'}</label>
                <input className="emp-edit-input-full" type="number" step="0.01" min="0" value={editData.hourlyWage} onChange={e=>setEditData(p=>({...p,hourlyWage:parseFloat(e.target.value)||0}))} />
              </div>
            </div>
          </div>

          {/* Schedule */}
          <div className="emp-edit-section">
            <div className="emp-edit-section-title">Weekly Schedule</div>
            <div className="schedule-edit-grid">
              {days.map(day=>(
                <div key={day} className="schedule-day-col">
                  <div className="schedule-day-header">{day.slice(0,3)}</div>
                  <div className="schedule-day-toggle">
                    <input type="checkbox" checked={!!editData.assignedHours[day]} onChange={e=>{
                      const newSched={...editData.assignedHours};
                      if(e.target.checked){
                        newSched[day]={start:'9:00am',end:'5:00pm'};
                      }else{
                        delete newSched[day];
                      }
                      setEditData(p=>({...p,assignedHours:newSched}));
                    }} />
                    <label>Active</label>
                  </div>
                  {editData.assignedHours[day]&&(
                    <>
                      <input className="schedule-time-input" value={editData.assignedHours[day].start||''} onChange={e=>{
                        const newSched={...editData.assignedHours,[day]:{...editData.assignedHours[day],start:e.target.value}};
                        setEditData(p=>({...p,assignedHours:newSched}));
                      }} placeholder="Start" />
                      <input className="schedule-time-input" value={editData.assignedHours[day].end||''} onChange={e=>{
                        const newSched={...editData.assignedHours,[day]:{...editData.assignedHours[day],end:e.target.value}};
                        setEditData(p=>({...p,assignedHours:newSched}));
                      }} placeholder="End" style={{marginTop:4}} />
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-gray" onClick={onClose}>Cancel</button>
          <button className="btn btn-green" onClick={handleSave}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

function ScheduleManagementModal({timers,onClose,onUpdateSchedule}) {
  const [selectedEmp,setSelectedEmp]=useState(timers[0]?.id||null);
  const currentTimer=timers.find(t=>t.id===selectedEmp)||timers[0];
  const [schedule,setSchedule]=useState(currentTimer?.assignedHours||{});
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  function handleDayToggle(day,checked) {
    const newSched={...schedule};
    if(checked){
      newSched[day]={start:'9:00am',end:'5:00pm'};
    }else{
      delete newSched[day];
    }
    setSchedule(newSched);
  }

  function handleTimeChange(day,field,value) {
    const newSched={...schedule};
    if(newSched[day]){
      newSched[day]={...newSched[day],[field]:value};
    }
    setSchedule(newSched);
  }

  function handleSaveSchedule() {
    onUpdateSchedule(selectedEmp,schedule);
  }

  function handlePrintSchedule() {
    const printWindow=window.open('','_blank');
    const empName=currentTimer?.name||'Employee';
    let html=`<html><head><title>${empName} - Weekly Schedule</title>`;
    html+=`<style>body{font-family:'Segoe UI',sans-serif;padding:20px;}
      h1{color:#0d1b3e;border-bottom:2px solid #c9a84c;padding-bottom:10px;}
      table{width:100%;border-collapse:collapse;margin-top:20px;}
      th{background:#0d1b3e;color:#fff;padding:12px;text-align:center;}
      td{padding:12px;border:1px solid #ddd;text-align:center;}
      .inactive{color:#999;}</style></head><body>`;
    html+=`<h1>${empName} - Weekly Schedule</h1>`;
    html+=`<table><tr><th>Day</th><th>Status</th><th>Start Time</th><th>End Time</th></tr>`;
    days.forEach(day=>{
      const sched=schedule[day];
      if(sched){
        html+=`<tr><td>${day}</td><td>Active</td><td>${sched.start}</td><td>${sched.end}</td></tr>`;
      }else{
        html+=`<tr><td>${day}</td><td class="inactive">Off</td><td class="inactive">—</td><td class="inactive">—</td></tr>`;
      }
    });
    html+=`</table></body></html>`;
    printWindow.document.write(html);
    printWindow.document.close();
    printWindow.print();
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Manage Employee Schedules</div>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          {/* Employee Selector */}
          <div style={{marginBottom:20}}>
            <label style={{fontSize:'.75rem',fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:'.5px',display:'block',marginBottom:8}}>Select Employee</label>
            <select className="emp-edit-input-full" value={selectedEmp||''} onChange={e=>{
              const emp=timers.find(t=>t.id===parseInt(e.target.value));
              setSelectedEmp(parseInt(e.target.value));
              setSchedule(emp?.assignedHours||{});
            }}>
              {timers.filter(t=>!t.isHidden).map(t=>(
                <option key={t.id} value={t.id}>{t.name}</option>
              ))}
            </select>
          </div>

          {/* Schedule Grid */}
          <div className="schedule-edit-grid">
            {days.map(day=>(
              <div key={day} className="schedule-day-col">
                <div className="schedule-day-header">{day}</div>
                <div className="schedule-day-toggle">
                  <input type="checkbox" checked={!!schedule[day]} onChange={e=>handleDayToggle(day,e.target.checked)} />
                  <label>Active</label>
                </div>
                {schedule[day]&&(
                  <>
                    <input className="schedule-time-input" value={schedule[day].start||''} onChange={e=>handleTimeChange(day,'start',e.target.value)} placeholder="Start" />
                    <input className="schedule-time-input" value={schedule[day].end||''} onChange={e=>handleTimeChange(day,'end',e.target.value)} placeholder="End" style={{marginTop:4}} />
                  </>
                )}
              </div>
            ))}
          </div>
        </div>
        <div className="modal-footer">
          <button className="schedule-print-btn" onClick={handlePrintSchedule}>🖨 Print Schedule</button>
          <button className="btn btn-gray" onClick={onClose}>Cancel</button>
          <button className="btn btn-green" onClick={handleSaveSchedule}>Save Schedule</button>
        </div>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [timers,setTimers]             = useState(()=>loadTimers().map(doCheckResets));
  const [tick,setTick]                 = useState(0);
  const [modal,setModal]               = useState('none');
  const [notify,setNotify]             = useState(null);
  const [payrollText,setPayrollText]   = useState('');
  const [lastSaved,setLastSaved]       = useState(null);
  const [otAlert,setOtAlert]           = useState({show:false,timerId:null});
  const [appSessions,setAppSessions]   = useState(loadAppSessions);
  const [appCosts,setAppCosts]         = useState(loadAppCosts);
  const [auditLog,setAuditLog]             = useState(loadAuditLog);
  const [auditEmpFilter,setAuditEmpFilter] = useState(null);
  const [correctionTimerId,setCorrectionTimerId] = useState(null);
  const [payrollPeriods,setPayrollPeriods] = useState(loadPayrollPeriods);
  const [showPayrollPage,setShowPayrollPage] = useState(false);
  const [showAddEmployee,setShowAddEmployee] = useState(false);
  const [activePage,setActivePage]           = useState(()=>localStorage.getItem('activeBusinessPage')||'pageEmployeeClock');
  const [editEmployeeId,setEditEmployeeId]   = useState(null);  // For employee edit modal
  const [showScheduleModal,setShowScheduleModal] = useState(false);  // For schedule management
  const [showHolidayModal,setShowHolidayModal] = useState(false);  // For holiday schedule
  const otAlerted = useRef(new Set());

  // Load data from backend on initial mount
  useEffect(() => {
    async function loadFromBackend() {
      try {
        const response = await fetch(SYNC_API_URL, { method: 'GET' });
        if (response.ok) {
          const result = await response.json();
          if (result.data) {
            // Merge server data with local data
            if (result.data.timers && result.data.timers.length > 0) {
              setTimers(prev => {
                const merged = prev.map(t => {
                  const serverTimer = result.data.timers.find(st => st.id === t.id);
                  return serverTimer ? { ...t, ...serverTimer } : t;
                });
                // Add any new timers from server
                const serverIds = new Set(result.data.timers.map(t => t.id));
                const newTimers = result.data.timers.filter(t => !serverIds.has(t.id));
                return [...merged, ...newTimers];
              });
            }
            if (result.data.appSessions) setAppSessions(result.data.appSessions);
            if (result.data.appCosts) setAppCosts(result.data.appCosts);
            if (result.data.auditLog) setAuditLog(result.data.auditLog);
            if (result.data.payrollPeriods) setPayrollPeriods(result.data.payrollPeriods);
            console.log('Synced from server at:', result.lastUpdated);
          }
        }
      } catch (e) {
        console.log('Using local data (backend not available)');
      }
    }
    loadFromBackend();
  }, []);

  useEffect(()=>{const iv=setInterval(()=>setTick(n=>n+1),1000);return()=>clearInterval(iv);},[]);

  useEffect(()=>{
    setTimers(prev=>prev.map(t=>{
      const u=doCheckResets(t);
      if(u.isRunning&&!otAlerted.current.has(u.id)){
        const endSec=getScheduleEndSec(u);const todaySec=getTodaySec(u);
        if(endSec!==null&&todaySec>endSec){otAlerted.current.add(u.id);setOtAlert({show:true,timerId:u.id});}
      }
      return u;
    }));
    setAppSessions(p=>p);
  },[tick]);

  useEffect(()=>{const iv=setInterval(doSave,AUTOSAVE_MS);return()=>clearInterval(iv);},[timers,appSessions,appCosts,auditLog]);

  function addAudit(entry) {
    setAuditLog(prev=>{
      const next=[...prev,entry];
      try{localStorage.setItem(STORAGE_AUDIT,JSON.stringify(next));}catch(e){}
      return next;
    });
  }

  function doSave() {
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(timers.map(t=>{const{isRunning,isPaused,clockInTime,pauseStartTime,totalPausedMs,...rest}=t;return rest;})));
      localStorage.setItem(STORAGE_APPS,JSON.stringify(appSessions));
      localStorage.setItem(STORAGE_COSTS,JSON.stringify(appCosts));
      localStorage.setItem(STORAGE_AUDIT,JSON.stringify(auditLog));
      savePayrollPeriods(payrollPeriods);
      setLastSaved(Date.now());
      
      // Sync to backend
      syncSaveData({
        timers: timers.map(t => { const{isRunning,isPaused,clockInTime,pauseStartTime,totalPausedMs,...rest}=t; return rest; }),
        appSessions,
        appCosts,
        auditLog,
        payrollPeriods
      });
    }catch(e){console.warn('Save failed:',e);}
  }

  function showNotify(msg,type='info'){setNotify({msg,type});}

  function handleClockIn(id) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    const res=canClockIn(timer);
    if(!res.ok){showNotify(res.reason,'error');return;}
    otAlerted.current.delete(id);
    setTimers(prev=>prev.map(t=>t.id===id?doClockIn(t):t));
    addAudit(mkAuditEntry({empId:id,empName:timer.name,actionType:'CLOCK_IN',newValue:fmtTSFull(Date.now()),performedBy:timer.name,isAdminEdit:false}));
  }

  function handlePause(id) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    setTimers(prev=>prev.map(t=>t.id===id?doPause(t):t));
    addAudit(mkAuditEntry({empId:id,empName:timer.name,actionType:'BREAK_START',newValue:fmtTSFull(Date.now()),performedBy:timer.name,isAdminEdit:false}));
  }

  function handleResume(id) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    setTimers(prev=>prev.map(t=>t.id===id?doResume(t):t));
    addAudit(mkAuditEntry({empId:id,empName:timer.name,actionType:'BREAK_END',newValue:fmtTSFull(Date.now()),performedBy:timer.name,isAdminEdit:false}));
  }

  function handleClockOut(id) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    const elapsed=getElapsedSec(timer);
    otAlerted.current.delete(id);
    setTimers(prev=>prev.map(t=>t.id===id?doClockOut(t):t));
    addAudit(mkAuditEntry({empId:id,empName:timer.name,actionType:'CLOCK_OUT',
      originalValue:timer.clockInTime?fmtTSFull(timer.clockInTime):'—',
      newValue:`Out at ${fmtTSFull(Date.now())} · ${fmtHM(elapsed)}`,
      performedBy:timer.name,isAdminEdit:false}));
  }

  function handleEditName(id,name) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    const oldName=timer.name;
    setTimers(prev=>prev.map(t=>t.id===id?{...t,name:name||t.name}:t));
    addAudit(mkAuditEntry({empId:id,empName:name||oldName,actionType:'NAME_EDIT',
      originalValue:oldName,newValue:name,performedBy:'Administrator',isAdminEdit:true,
      reason:'Employee name updated by admin'}));
  }

  function handleSaveEmployeeEdit(id,editData) {
    const timer=timers.find(t=>t.id===id);
    if(!timer)return;
    const oldData={name:timer.name,title:timer.title,hourlyWage:timer.hourlyWage,wageType:timer.wageType,hireDate:timer.hireDate,isExempt:timer.isExempt,profileImage:timer.profileImage,assignedHours:timer.assignedHours};
    setTimers(prev=>prev.map(t=>t.id===id?{...t,...editData}:t));
    addAudit(mkAuditEntry({empId:id,empName:editData.name,actionType:'MANUAL_EDIT',
      originalValue:JSON.stringify(oldData),
      newValue:JSON.stringify(editData),
      performedBy:'Administrator',isAdminEdit:true,
      reason:'Employee details updated via edit modal'}));
    showNotify(`Employee ${editData.name} details updated successfully.`,'success');
  }

  function handleUpdateSchedule(empId,schedule) {
    const timer=timers.find(t=>t.id===empId);
    if(!timer)return;
    const oldSched=JSON.stringify(timer.assignedHours||{});
    setTimers(prev=>prev.map(t=>t.id===empId?{...t,assignedHours:schedule}:t));
    addAudit(mkAuditEntry({empId,empName:timer.name,actionType:'MANUAL_EDIT',
      originalValue:`Schedule: ${oldSched}`,
      newValue:`Schedule: ${JSON.stringify(schedule)}`,
      performedBy:'Administrator',isAdminEdit:true,
      reason:'Employee schedule updated'}));
    showNotify(`Schedule updated for ${timer.name}.`,'success');
  }

  function handleOTChoice(choice) {
    const tid=otAlert.timerId;
    const timer=timers.find(t=>t.id===tid);
    setOtAlert({show:false,timerId:null});
    if(choice==='stop'){
      handleClockOut(tid);
      showNotify('Timer stopped. Hours saved.','info');
    }else{
      setTimers(prev=>prev.map(t=>t.id!==tid?t:{...t,otMode:choice}));
      if(timer){addAudit(mkAuditEntry({empId:tid,empName:timer.name,actionType:'OVERTIME_CHOICE',
        newValue:choice==='credits'?'PTO Credits selected':'Paid OT selected',performedBy:timer.name,isAdminEdit:false}));}
      showNotify(choice==='credits'?'PTO Credits mode activated.':'Paid overtime mode activated.','success');
    }
  }

  function handleAdminCorrection({timer,corrType,originalSec,newSec,reason,performedBy}) {
    setCorrectionTimerId(null);
    const fieldMap={today:'todaySavedSec',week:'weekSavedSec',month:'monthSavedSec'};
    const field=fieldMap[corrType];
    const labelMap={today:"Today's Hours",week:"Week's Hours",month:"Month's Hours"};
    setTimers(prev=>prev.map(t=>t.id!==timer.id?t:{...t,[field]:newSec}));
    addAudit(mkAuditEntry({empId:timer.id,empName:timer.name,actionType:'ADMIN_CORRECTION',
      originalValue:`${labelMap[corrType]}: ${fmtHM(originalSec)}`,
      newValue:`${labelMap[corrType]}: ${fmtHM(newSec)}`,
      performedBy,isAdminEdit:true,reason}));
    showNotify(`Correction saved for ${timer.name}. Audit entry created.`,'success');
  }

  function handlePayroll() {
    setPayrollText(generatePayrollReport(timers));
    setModal('payroll');
    timers.forEach(t=>{
      addAudit(mkAuditEntry({empId:t.id,empName:t.name,actionType:'PAYROLL_LOCKED',
        newValue:`Report generated ${fmtTSFull(Date.now())}`,performedBy:'Administrator',isAdminEdit:true}));
    });
  }

  function handleClear(sel) {
    setModal('none');
    if(sel.everything||(sel.todayHours&&sel.weekHours&&sel.monthHours&&sel.sessions&&sel.ptoData)){
      setTimers(prev=>prev.map(t=>mkFreshTimer(EMPLOYEE_CONFIGS.find(c=>c.id===t.id)||t)));
    }else{
      setTimers(prev=>prev.map(t=>{
        let u={...t};
        if(sel.todayHours)u.todaySavedSec=0;
        if(sel.weekHours)u.weekSavedSec=0;
        if(sel.monthHours)u.monthSavedSec=0;
        if(sel.sessions)u.sessions=[];
        if(sel.ptoData){u.ptoCredits=0;u.ptoHours=0;}
        return u;
      }));
    }
    if(sel.appSessions||sel.everything)setAppSessions([]);
    if(sel.appCosts||sel.everything)setAppCosts(DEFAULT_COSTS);
    if(sel.auditLog||sel.everything){setAuditLog([]);try{localStorage.removeItem(STORAGE_AUDIT);}catch(e){}}
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(timers));localStorage.setItem(STORAGE_APPS,JSON.stringify(appSessions));localStorage.setItem(STORAGE_COSTS,JSON.stringify(appCosts));}catch(e){}
    showNotify('Selected data cleared.','success');
  }

  function handleSessionAction(action,id,appName) {
    setAppSessions(prev=>{
      if(action==='start'){return[...prev,{id:Date.now().toString(),appName:appName.trim(),isRunning:true,isPaused:false,startTime:Date.now(),pauseStartTime:null,totalPausedMs:0,savedSec:0,date:getCTDateStr()}];}
      return prev.map(s=>{
        if(s.id!==id)return s;
        if(action==='pause')return{...s,isRunning:false,isPaused:true,pauseStartTime:Date.now()};
        if(action==='resume'){const pms=Date.now()-s.pauseStartTime;return{...s,isRunning:true,isPaused:false,pauseStartTime:null,totalPausedMs:(s.totalPausedMs||0)+pms};}
        if(action==='stop'){const elapsed=s.isRunning?Math.max(0,(Date.now()-s.startTime-(s.totalPausedMs||0))/1000):s.isPaused?Math.max(0,(s.pauseStartTime-s.startTime-(s.totalPausedMs||0))/1000):0;return{...s,isRunning:false,isPaused:false,savedSec:(s.savedSec||0)+elapsed,startTime:null,pauseStartTime:null,totalPausedMs:0};}
        return s;
      });
    });
  }

  function handleCostAction(action,id,data) {
    if(action==='add')setAppCosts(prev=>[...prev,{id:Date.now().toString(),...data}]);
    else if(action==='remove')setAppCosts(prev=>prev.filter(c=>c.id!==id));
  }

  function handleSavePeriod(period) {
    setPayrollPeriods(prev=>{
      const idx=prev.findIndex(p=>p.id===period.id);
      const next=idx>=0?prev.map((p,i)=>i===idx?period:p):[...prev,period];
      savePayrollPeriods(next);
      return next;
    });
  }

  function handleAddEmployee({name,title,payType,rate,hireDate,isOwner}) {
    const newId=Date.now();
    const newTimer={
      id:newId,name,title,hireDate,
      hourlyWage:rate,wageType:payType,
      assignedHours:{...STD_SCHED},isExempt:false,isNameEditable:true,
      isOwner:!!isOwner,isHidden:false,
      isRunning:false,isPaused:false,clockInTime:null,pauseStartTime:null,totalPausedMs:0,
      todaySavedSec:0,weekSavedSec:0,monthSavedSec:0,
      ptoCredits:0,ptoHours:0,
      lastDate:null,lastWeek:null,lastMonth:null,sessions:[],otMode:'paid'
    };
    setTimers(prev=>{
      const next=[...prev,newTimer];
      try{
        const {isRunning,isPaused,clockInTime,pauseStartTime,totalPausedMs,...rest}=newTimer;
        const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
        saved.push(rest);
        localStorage.setItem(STORAGE_KEY,JSON.stringify(saved));
      }catch(e){}
      return next;
    });
    setShowAddEmployee(false);
    showNotify(`${name} added to the dashboard.`,'success');
    addAudit(mkAuditEntry({empId:newId,empName:name,actionType:'SYSTEM_ENTRY',
      newValue:`New employee added: ${name} · ${payType==='flat'?'Flat $'+rate+'/shift':'$'+rate+'/hr'} · ${isOwner?'Owner':'Staff'}`,
      performedBy:'Administrator',isAdminEdit:true}));
  }

  function handleDeactivateEmployee(id) {
    const t=timers.find(x=>x.id===id);if(!t)return;
    setTimers(prev=>prev.map(x=>x.id===id?{...x,isHidden:true}:x));
    showNotify(`${t.name} deactivated. All time logs preserved.`,'info');
    addAudit(mkAuditEntry({empId:id,empName:t.name,actionType:'SYSTEM_ENTRY',
      newValue:'Employee deactivated — card hidden, logs preserved',
      performedBy:'Administrator',isAdminEdit:true}));
  }

  function handleReactivateEmployee(id) {
    const t=timers.find(x=>x.id===id);if(!t)return;
    setTimers(prev=>prev.map(x=>x.id===id?{...x,isHidden:false}:x));
    showNotify(`${t.name} reactivated.`,'success');
    addAudit(mkAuditEntry({empId:id,empName:t.name,actionType:'SYSTEM_ENTRY',
      newValue:'Employee reactivated — card visible on dashboard',
      performedBy:'Administrator',isAdminEdit:true}));
  }

  function showPage(pageId) {
    setActivePage(pageId);
    localStorage.setItem('activeBusinessPage',pageId);
  }

  const now=getCTNow();
  const dayStr=now.toLocaleDateString('en-US',{timeZone:TZ,weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const timeStr=now.toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
  const todayHoliday=isHoliday(getCTDateStr(now));
  const otTimer=timers.find(t=>t.id===otAlert.timerId);
  const correctionTimer=timers.find(t=>t.id===correctionTimerId);

  return(
    <div>
      <div className="header">
        <div className="header-brand">
          <div className="header-title">{activePage==='pageEmployeeClock'?'iTeam Legal Solutions':'ProGuide Tech Solutions'}</div>
          <div className="header-sub">{activePage==='pageEmployeeClock'?'Employee Time Tracking System':'App Development Time Keeper'}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <div style={{fontSize:'.85rem',fontWeight:600,color:'rgba(255,255,255,.9)'}}>{timeStr}</div>
          <div style={{fontSize:'.7rem',color:'var(--gold2)'}}>{dayStr}</div>
          {todayHoliday&&<div style={{fontSize:'.68rem',color:'#fca5a5',fontWeight:600}}>⚠ Office Holiday</div>}
        </div>
        <div className="header-actions">
          {activePage==='pageEmployeeClock'&&<>
            {lastSaved&&<span className="save-status">Saved {fmtTS(lastSaved)}</span>}
            <button className="btn btn-gold btn-sm" onClick={doSave}>💾 Save</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setModal('schedule')}>📅 Schedule</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setShowPayrollPage(true)}>📋 Payroll</button>
            <button className="btn btn-purple btn-sm" onClick={()=>{setAuditEmpFilter(null);setModal('audit');}}>🔒 Audit Log</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setModal('clear')} style={{borderColor:'rgba(239,68,68,.5)',color:'#fca5a5'}}>🗑 Clear</button>
          </>}
        </div>
      </div>

      <Toast notify={notify} onClear={()=>setNotify(null)} />

      <div className="app-shell">

        {/* ── SIDEBAR ── */}
        <nav className="sidebar">
          <div className="sidebar-brand">
            <div className="sidebar-brand-title">Business Dashboard</div>
          </div>

          {/* iTeam Legal Solutions */}
          <div className="sidebar-section">
            <div className="sidebar-section-label">iTeam Legal Solutions</div>
            <button data-page="pageEmployeeClock"
              className={`sidebar-link${activePage==='pageEmployeeClock'?' active':''}`}
              onClick={()=>showPage('pageEmployeeClock')}>
              👥 Employee Clock
            </button>
            <button data-page="pageSchedule"
              className={`sidebar-link${activePage==='pageSchedule'?' active':''}`}
              onClick={()=>setShowScheduleModal(true)}>
              📅 Schedule Manager
            </button>
            <button data-page="pageHolidays"
              className={`sidebar-link${activePage==='pageHolidays'?' active':''}`}
              onClick={()=>setShowHolidayModal(true)}>
              🎌 Holiday Schedule
            </button>
            {/* ADD ITEAM PAGES HERE: Payroll, Schedule, Audit Log, Clients, etc. */}
          </div>

          {/* ProGuide Tech Solutions */}
          <div className="sidebar-section">
            <div className="sidebar-section-label">ProGuide Tech Solutions</div>
            <button data-page="pageAppDevTimeKeeper"
              className={`sidebar-link${activePage==='pageAppDevTimeKeeper'?' active':''}`}
              onClick={()=>showPage('pageAppDevTimeKeeper')}>
              ⏱ App Dev Time Keeper
            </button>
            {/* ADD PROGUIDE PAGES HERE: Projects, Clients, Reports, Settings, etc. */}
          </div>
        </nav>

        {/* ── CONTENT AREA ── */}
        <div className="content-area">

          {/* PAGE: Employee Clock */}
          <div className={`page-view${activePage==='pageEmployeeClock'?' active':''}`}>
            <div className="main">
              <div className="page-title-bar">iTeam Legal Solutions — Employee Clock</div>
              <div className="section-title">Staff Clock — {timers.filter(t=>!t.isHidden&&t.isRunning).length} active · {timers.filter(t=>!t.isHidden&&t.isPaused).length} on break</div>
              <LivePayrollDashboard timers={timers} tick={tick} />
              <div className="emp-grid">
                {timers.filter(t=>!t.isHidden).map(t=>(
                  <EmployeeCard key={t.id} timer={t} tick={tick}
                    onClockIn={handleClockIn} onPause={handlePause}
                    onResume={handleResume} onClockOut={handleClockOut}
                    onEditName={handleEditName}
                    onViewLog={(id)=>{setAuditEmpFilter(id);setModal('audit');}}
                    onCorrect={(id)=>{setCorrectionTimerId(id);}}
                    onDeactivate={!t.isOwner?handleDeactivateEmployee:null}
                    onEditEmployee={(id)=>setEditEmployeeId(id)}
                  />
                ))}
                <AddEmployeeCard onClick={()=>setShowAddEmployee(true)} />
              </div>
              <InactiveStaffSection timers={timers.filter(t=>t.isHidden)} onReactivate={handleReactivateEmployee} />
            </div>
          </div>

          {/* PAGE: App Development Time Keeper */}
          <div className={`page-view${activePage==='pageAppDevTimeKeeper'?' active':''}`}>
            <div className="main">
              <div className="page-title-bar">ProGuide Tech Solutions — App Development Time Keeper</div>
              <AppTimeKeeper sessions={appSessions} costs={appCosts} tick={tick} onSessionAction={handleSessionAction} onCostAction={handleCostAction} />
            </div>
          </div>

        </div>
      </div>

      <OvertimeModal alert={otAlert} timer={otTimer} onChoice={handleOTChoice} />
      {modal==='payroll'  && <PayrollModal text={payrollText} onClose={()=>setModal('none')} />}
      {modal==='schedule' && <ScheduleModal timers={timers.filter(t=>!t.isHidden)} onClose={()=>setModal('none')} />}
      {modal==='clear'    && <ClearModal onClear={handleClear} onClose={()=>setModal('none')} />}
      {modal==='audit'    && <AuditLogModal auditLog={auditLog} timers={timers} filterEmpId={auditEmpFilter} onClose={()=>setModal('none')} />}
      {correctionTimerId!=null && <AdminCorrectionModal timer={correctionTimer} onSave={handleAdminCorrection} onClose={()=>setCorrectionTimerId(null)} />}
      {showAddEmployee && <AddEmployeeModal onSave={handleAddEmployee} onClose={()=>setShowAddEmployee(false)} />}
      {editEmployeeId!=null && <EmployeeEditModal timer={timers.find(t=>t.id===editEmployeeId)} onClose={()=>setEditEmployeeId(null)} onSave={handleSaveEmployeeEdit} />}
      {showScheduleModal && <ScheduleManagementModal timers={timers.filter(t=>!t.isHidden)} onClose={()=>setShowScheduleModal(false)} onUpdateSchedule={handleUpdateSchedule} />}
      {showHolidayModal && <HolidayScheduleModal onClose={()=>setShowHolidayModal(false)} />}

      {showPayrollPage&&(
        <PayrollPage
          timers={timers}
          auditLog={auditLog}
          onAddAudit={addAudit}
          payrollPeriods={payrollPeriods}
          onSavePeriod={handleSavePeriod}
          onClose={()=>setShowPayrollPage(false)}
          onOpenAudit={()=>{setAuditEmpFilter(null);setModal('audit');}}
        />
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
