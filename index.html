<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iTeam Legal Solutions – Employee Time Tracking</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}
:root{
  --navy:#0d1b3e;--navy2:#1a2f5e;--gold:#c9a84c;--gold2:#e8c96d;
  --green:#1db954;--green-bg:#e8f8ed;--yellow:#f5a623;--yellow-bg:#fff8e6;
  --red:#e53935;--red-bg:#fdecea;--gray:#6b7280;--gray-bg:#f3f4f6;
  --white:#ffffff;--shadow:0 2px 8px rgba(0,0,0,.12);--shadow-lg:0 4px 20px rgba(0,0,0,.18);
  --radius:12px;--radius-sm:8px;
}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:var(--white);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:70px;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.header-brand{display:flex;flex-direction:column}
.header-title{font-size:1.2rem;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:.72rem;color:var(--gold2);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.header-actions{display:flex;align-items:center;gap:10px}
.save-status{font-size:.72rem;color:rgba(255,255,255,.6);margin-right:6px;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;font-weight:600;letter-spacing:.3px;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:var(--white)}.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-xs{padding:4px 8px;font-size:.68rem}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#17a548}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#c62828}
.btn-yellow{background:var(--yellow);color:#fff}.btn-yellow:hover{background:#e59600}
.btn-gray{background:#e5e7eb;color:#374151}.btn-gray:hover{background:#d1d5db}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2)}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
.main{padding:24px;max-width:1400px;margin:0 auto}
.section-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.8px}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(to right,var(--gold),transparent)}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:28px}
.emp-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s;position:relative}
.emp-card:hover{box-shadow:var(--shadow-lg)}
.card-stripe{height:5px;background:var(--gray-bg)}
.card-stripe.running{background:linear-gradient(90deg,var(--green),#52e090)}
.card-stripe.paused{background:linear-gradient(90deg,var(--yellow),#ffd07a)}
.card-stripe.stopped{background:linear-gradient(90deg,#cbd5e1,#e2e8f0)}
.card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.card-name{font-size:1rem;font-weight:700;color:var(--navy);line-height:1.2}
.card-title{font-size:.72rem;color:var(--gray);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.card-badge{padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-running{background:var(--green-bg);color:#0a7a30}
.badge-paused{background:var(--yellow-bg);color:#a56300}
.badge-stopped{background:var(--gray-bg);color:var(--gray)}
.badge-exempt{background:#ede9fe;color:#5b21b6}
.card-timer{padding:12px 16px;text-align:center;background:linear-gradient(135deg,#f8faff,#edf2ff)}
.timer-display{font-size:2.2rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--navy);font-family:'Courier New',monospace}
.timer-display.running{color:var(--green)}
.timer-display.paused{color:var(--yellow)}
.timer-clock-time{font-size:.72rem;color:var(--gray);margin-top:4px}
.card-stats{padding:10px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;border-bottom:1px solid #f1f5f9}
.stat-item{text-align:center}
.stat-label{font-size:.6rem;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:.82rem;font-weight:700;color:var(--navy);margin-top:1px}
.stat-value.ot{color:var(--red)}
.card-earnings{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:#fafbfe}
.earnings-label{font-size:.7rem;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.earnings-value{font-size:.95rem;font-weight:700;color:#0d6c2f}
.pto-info{font-size:.7rem;color:#5b21b6;font-weight:600}
.card-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.card-audit-row{padding:6px 16px 10px;display:flex;gap:6px;border-top:1px solid #f1f5f9;background:#fafbfe}
.name-edit-input{border:1.5px solid #cbd5e1;border-radius:6px;padding:4px 8px;font-size:.82rem;width:100%;margin-bottom:6px;outline:none}
.name-edit-input:focus{border-color:var(--gold)}
.hire-date{font-size:.65rem;color:var(--gray);padding:4px 16px 8px;text-align:right}
.toast{position:fixed;top:80px;right:20px;z-index:999;padding:12px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;box-shadow:var(--shadow-lg);max-width:360px;animation:slideIn .3s ease}
.toast-error{background:#fff0f0;color:var(--red);border-left:4px solid var(--red)}
.toast-success{background:var(--green-bg);color:#0a7a30;border-left:4px solid var(--green)}
.toast-info{background:#eff6ff;color:#1d4ed8;border-left:4px solid #3b82f6}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-lg{max-width:780px}
.modal-xl{max-width:1100px}
.modal-header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--white);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1rem;font-weight:700;letter-spacing:.3px}
.modal-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:1.4rem;line-height:1;padding:0;transition:color .2s}
.modal-close:hover{color:#fff}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:10px}
.ot-option{padding:16px 20px;border:2px solid #e5e7eb;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.ot-option:hover{border-color:var(--gold);background:#fffef5}
.ot-option-icon{font-size:1.6rem;line-height:1}
.ot-option-title{font-weight:700;color:var(--navy);margin-bottom:3px}
.ot-option-desc{font-size:.78rem;color:var(--gray)}
.report-pre{font-family:'Courier New',monospace;font-size:.78rem;line-height:1.6;background:#f8faff;border:1px solid #e2e8f0;border-radius:var(--radius-sm);padding:20px;white-space:pre-wrap;overflow-x:auto}
.schedule-table{width:100%;border-collapse:collapse;font-size:.82rem}
.schedule-table th{background:var(--navy);color:#fff;padding:8px 12px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.schedule-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.schedule-table tr:nth-child(even) td{background:#f8faff}
.sched-day-cell{display:flex;flex-direction:column;gap:2px}
.sched-day{font-size:.7rem;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sched-hours{font-size:.78rem;color:var(--navy);font-weight:600}
.sched-off{color:var(--gray);font-style:italic;font-size:.72rem}

/* ── EMPLOYEE EDIT MODAL ── */
.emp-edit-modal-body{padding:24px;overflow-y:auto;flex:1}
.emp-edit-header{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #e5e7eb}
.emp-avatar-large{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;font-weight:700;flex-shrink:0}
.emp-avatar-large img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.emp-edit-name-section{flex:1}
.emp-edit-name-input{font-size:1.3rem;font-weight:700;color:var(--navy);border:none;border-bottom:2px solid transparent;padding:4px 0;width:100%;outline:none;background:transparent}
.emp-edit-name-input:focus{border-color:var(--gold)}
.emp-edit-title-input{font-size:.9rem;color:var(--gray);border:none;border-bottom:1px solid #e5e7eb;padding:4px 0;width:100%;outline:none;margin-top:4px}
.emp-edit-title-input:focus{border-color:var(--gold)}
.emp-edit-section{margin-bottom:20px}
.emp-edit-section-title{font-size:.7rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #e5e7eb}
.emp-edit-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.emp-edit-field{display:flex;flex-direction:column;gap:4px}
.emp-edit-label{font-size:.72rem;color:var(--gray);font-weight:600}
.emp-edit-input{border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:8px 12px;font-size:.85rem;outline:none;font-family:inherit}
.emp-edit-input:focus{border-color:var(--gold)}
.emp-edit-input-full{width:100%;border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:8px 12px;font-size:.85rem;outline:none;font-family:inherit}
.emp-edit-input-full:focus{border-color:var(--gold)}
.emp-avatar-upload{display:flex;align-items:center;gap:12px}
.emp-avatar-preview{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;font-weight:700;flex-shrink:0;overflow:hidden}
.emp-avatar-preview img{width:100%;height:100%;object-fit:cover}
.emp-avatar-btn{background:var(--gray-bg);border:none;padding:8px 14px;border-radius:var(--radius-sm);font-size:.75rem;font-weight:600;cursor:pointer;color:var(--navy)}
.emp-avatar-btn:hover{background:#e2e8f0}
.emp-avatar-remove{background:none;border:none;color:var(--red);font-size:.7rem;cursor:pointer;margin-left:4px}
.emp-avatar-remove:hover{text-decoration:underline}

/* ── SCHEDULE MANAGEMENT ── */
.schedule-edit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.schedule-day-col{background:#f8faff;border-radius:var(--radius-sm);padding:12px;text-align:center}
.schedule-day-header{font-size:.65rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.schedule-day-toggle{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:8px}
.schedule-day-toggle input{width:16px;height:16px;accent-color:var(--navy)}
.schedule-day-toggle label{font-size:.7rem;color:var(--gray);cursor:pointer}
.schedule-time-input{width:100%;border:1px solid #cbd5e1;border-radius:4px;padding:6px;font-size:.72rem;text-align:center;outline:none}
.schedule-time-input:focus{border-color:var(--gold)}
.schedule-print-btn{background:var(--navy);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.schedule-print-btn:hover{background:var(--navy2)}
.schedule-list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.schedule-list-info{flex:1}
.schedule-list-name{font-weight:700;color:var(--navy);font-size:.9rem}
.schedule-list-days{font-size:.72rem;color:var(--gray);margin-top:2px}
.schedule-list-actions{display:flex;gap:6px}

/* ── HOLIDAY SCHEDULE ── */
.holiday-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:12px}
.holiday-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px}
.holiday-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
.holiday-table tr:nth-child(even) td{background:#f8faff}
.holiday-date{font-weight:700;color:var(--navy)}
.holiday-name{font-weight:600;color:var(--navy)}
.holiday-status{font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:700;text-transform:uppercase}
.holiday-status-closed{background:#fdecea;color:#991b1b}
.holiday-status-optional{background:#fff8e6;color:#a56300}
.holiday-status-skeleton{background:#e0f2fe;color:#075985}
.holiday-status-none{background:#f3f4f6;color:#374151}
.card-name-clickable{cursor:pointer;transition:color .2s}
.card-name-clickable:hover{color:var(--gold)}
.clear-option{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .2s}
.clear-option:hover{background:var(--gray-bg)}
.clear-option input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);cursor:pointer}
.clear-option-label{flex:1}
.clear-option-title{font-weight:600;color:var(--navy);font-size:.88rem}
.clear-option-desc{font-size:.72rem;color:var(--gray);margin-top:2px}
.app-section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:28px}
.app-section-header{background:linear-gradient(135deg,#1a1a2e,#2d2d6b);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.app-section-title{font-size:.95rem;font-weight:700;letter-spacing:.3px}
.app-section-brand{font-size:.68rem;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.app-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;min-height:300px}
.app-col{padding:20px;border-right:1px solid #f1f5f9}
.app-col:last-child{border-right:none}
.app-col-title{font-size:.72rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e8f0fe}
.app-session-card{background:#f8faff;border:1px solid #e2e8f0;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;position:relative}
.app-session-name{font-weight:700;color:var(--navy);font-size:.85rem;margin-bottom:6px}
.app-session-timer{font-size:1.4rem;font-weight:700;font-family:'Courier New',monospace;color:var(--green);margin-bottom:6px}
.app-session-timer.paused{color:var(--yellow)}
.app-session-timer.stopped{color:var(--gray)}
.app-session-actions{display:flex;gap:6px;flex-wrap:wrap}
.app-new-row{display:flex;gap:8px;margin-bottom:12px}
.app-new-input{flex:1;border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:8px 12px;font-size:.82rem;outline:none}
.app-new-input:focus{border-color:var(--gold)}
.stat-card{background:#f8faff;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.stat-card-label{font-size:.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.stat-card-value{font-size:1rem;font-weight:700;color:var(--navy)}
.stat-card-value.earnings{color:#0d6c2f}
.app-summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem}
.app-summary-row:last-child{border-bottom:none}
.app-summary-name{font-weight:600;color:var(--navy)}
.app-summary-hours{color:var(--gray)}
.app-summary-earn{font-weight:700;color:#0d6c2f}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:.8rem}
.cost-row:last-child{border-bottom:none}
.cost-name{font-weight:600;color:var(--navy)}
.cost-period{font-size:.68rem;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.cost-amount{font-weight:700;color:var(--red)}
.cost-total{display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:2px solid #e2e8f0;font-size:.82rem;font-weight:700}
.cost-add-row{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.cost-input{border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:6px 10px;font-size:.78rem;outline:none}
.cost-input:focus{border-color:var(--gold)}
.cost-input-row{display:flex;gap:6px}

/* ── AUDIT LOG ── */
.audit-filter-bar{padding:14px 20px;background:#f8faff;border-bottom:1px solid #e5e7eb;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.audit-filter-group{display:flex;flex-direction:column;gap:3px}
.audit-filter-label{font-size:.65rem;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.audit-filter-input{border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:5px 9px;font-size:.78rem;outline:none;background:#fff;min-width:130px}
.audit-filter-input:focus{border-color:var(--gold)}
.audit-table-wrap{overflow-x:auto;padding:0 20px 20px}
.audit-table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:12px;min-width:900px}
.audit-table th{background:var(--navy);color:#fff;padding:9px 10px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0}
.audit-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top;max-width:200px;word-break:break-word}
.audit-table tr:nth-child(even) td{background:#f8faff}
.audit-table tr:hover td{background:#eff6ff}
.audit-empty{padding:40px 20px;text-align:center;color:var(--gray);font-style:italic;font-size:.88rem}
.audit-count{font-size:.72rem;color:var(--gray);padding:8px 20px 0;font-style:italic}
.action-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.62rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.badge-emp-action{background:#dcfce7;color:#166534}
.badge-admin-corr{background:#fef9c3;color:#854d0e}
.badge-payroll-locked{background:#ede9fe;color:#5b21b6}
.badge-system-entry{background:#e0f2fe;color:#075985}
.badge-manual-edit{background:#fee2e2;color:#991b1b}
.locked-icon{color:#5b21b6;font-size:.8rem}

/* ── ADMIN CORRECTION ── */
.correction-field{margin-bottom:16px}
.correction-label{font-size:.75rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.correction-input{width:100%;border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:8px 12px;font-size:.85rem;outline:none;font-family:inherit}
.correction-input:focus{border-color:var(--gold)}
.correction-current{font-size:.78rem;color:var(--gray);margin-top:4px}
.correction-reason{width:100%;border:1.5px solid #cbd5e1;border-radius:var(--radius-sm);padding:8px 12px;font-size:.82rem;outline:none;font-family:inherit;resize:vertical;min-height:80px}
.correction-reason:focus{border-color:var(--gold)}
.correction-warning{font-size:.75rem;color:var(--red);margin-top:4px;font-weight:600}

/* ── OFFICE PAYROLL PAGE ── */
.payroll-page-wrap{position:fixed;inset:0;z-index:150;background:#f0f2f5;overflow-y:auto;display:flex;flex-direction:column}

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ==================== CONSTANTS ====================
const STORAGE_KEY   = 'iteam_v3';

const TZ = 'America/Chicago';
const OT_DAILY_SEC  = 8 * 3600;

const AUTOSAVE_MS   = 3 * 60 * 1000;
const DEV_RATE      = 35;

// ==================== DATE/TIME UTILS ====================
function getCTNow() {
  return new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
}
function getCTDateStr(d) {
  const dt = d||getCTNow();
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function getCTWeekStr(d) {
  const dt = new Date((d||getCTNow()).getTime());
  dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);
  const w1 = new Date(dt.getFullYear(),0,4);
  const wn = 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);
  return `${dt.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}
function getCTMonthStr(d) {
  const dt = d||getCTNow();
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
}
function getNowSec() {
  const n = getCTNow();
  return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
}
function parseTimeSec(s) {
  const lo=(s||'').toLowerCase().trim();
  const isPM=lo.includes('pm');
  const [h,m]=lo.replace(/[apm\s]/g,'').split(':').map(Number);
  let hrs=h;
  if(isPM&&h!==12)hrs+=12;
  if(!isPM&&h===12)hrs=0;
  return hrs*3600+(m||0)*60;
}
function fmtSec(s) {
  const sec=Math.max(0,Math.floor(s||0));
  return `${String(Math.floor(sec/3600)).padStart(2,'0')}:${String(Math.floor((sec%3600)/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}
function fmtHM(s) {
  const sec=Math.max(0,Math.floor(s||0));
  return `${Math.floor(sec/3600)}h ${String(Math.floor((sec%3600)/60)).padStart(2,'0')}m`;
}
function fmtMoney(n) {
  return '$'+(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtTS(ms) {
  if(!ms)return '—';
  return new Date(ms).toLocaleString('en-US',{timeZone:TZ,month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtTSFull(ms) {
  if(!ms)return '—';
  return new Date(ms).toLocaleString('en-US',{timeZone:TZ,month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
}
function fmtTimeOnly(ms) {
  if(!ms)return '—';
  return new Date(ms).toLocaleString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
}

// ==================== HOLIDAYS ====================
function nthWeekday(yr,mo,wd,nth) {
  const d=new Date(yr,mo-1,1);let c=0;
  while(d.getMonth()===mo-1){if(d.getDay()===wd){c++;if(c===nth)return getCTDateStr(d);}d.setDate(d.getDate()+1);}
  return null;
}
function lastWeekday(yr,mo,wd) {
  const d=new Date(yr,mo,0);
  while(d.getDay()!==wd)d.setDate(d.getDate()-1);
  return getCTDateStr(d);
}
function buildHolidays(yr) {
  // State Holiday Schedule for Fiscal Year 2026
  const holidays = [
    {date:`${yr}-09-01`,name:'Labor Day',status:'closed'},
    {date:`${yr}-09-23`,name:'Rosh Hashanah',status:'optional'},
    {date:`${yr}-09-24`,name:'Rosh Hashanah',status:'optional'},
    {date:`${yr}-10-02`,name:'Yom Kippur',status:'optional'},
    {date:`${yr}-11-11`,name:'Veterans Day',status:'closed'},
    {date:`${yr}-11-27`,name:'Thanksgiving Day',status:'closed'},
    {date:`${yr}-11-28`,name:'Day after Thanksgiving',status:'closed'},
    {date:`${yr}-12-24`,name:'Christmas Eve Day',status:'closed'},
    {date:`${yr}-12-25`,name:'Christmas Day',status:'closed'},
    {date:`${yr}-12-26`,name:'Day after Christmas',status:'closed'},
    {date:`${yr+1}-01-01`,name:"New Year's Day",status:'closed'},
    {date:`${yr+1}-01-19`,name:'Martin Luther King, Jr. Day',status:'closed'},
    {date:`${yr+1}-01-19`,name:'Confederate Heroes Day',status:'closed'},
    {date:`${yr+1}-02-16`,name:'Presidents\' Day',status:'closed'},
    {date:`${yr+1}-03-02`,name:'Texas Independence Day',status:'skeleton'},
    {date:`${yr+1}-04-03`,name:'Good Friday',status:'optional'},
    {date:`${yr+1}-04-21`,name:'San Jacinto Day',status:'skeleton'},
    {date:`${yr+1}-05-25`,name:'Memorial Day',status:'closed'},
    {date:`${yr+1}-06-19`,name:'Emancipation Day',status:'skeleton'},
    {date:`${yr+1}-07-04`,name:'Independence Day',status:'closed'},
    {date:`${yr+1}-08-27`,name:'LBJ Day',status:'skeleton'},
  ];
  return new Set(holidays.map(h => h.date));
}

// FY 2026 State Holiday Schedule with full details
const STATE_HOLIDAYS_FY2026 = [
  {date:'2025-09-01',name:'Labor Day',status:'closed',day:'Monday'},
  {date:'2025-09-23',name:'Rosh Hashanah',status:'optional',day:'Tuesday'},
  {date:'2025-09-24',name:'Rosh Hashanah',status:'optional',day:'Wednesday'},
  {date:'2025-10-02',name:'Yom Kippur',status:'optional',day:'Thursday'},
  {date:'2025-11-11',name:'Veterans Day',status:'closed',day:'Tuesday'},

  {date:'2026-01-01',name:"New Year's Day",status:'closed',day:'Thursday'},
  {date:'2026-01-19',name:'Martin Luther King, Jr. Day',status:'closed',day:'Monday'},

function getHolidayStatus(ds) {
  const holiday = STATE_HOLIDAYS_FY2026.find(h => h.date === ds);
  return holiday ? holiday.status : null;
}

function getHolidayInfo(ds) {
  return STATE_HOLIDAYS_FY2026.find(h => h.date === ds) || null;
}
const holidayCache={};
function isHoliday(ds) {
  const yr=parseInt(ds);
  if(!holidayCache[yr])holidayCache[yr]=buildHolidays(yr);
  return holidayCache[yr].has(ds);
}
function getHolidayName(ds) {
  const names={'01-01':"New Year's Day",'06-19':'Juneteenth','07-04':'Independence Day',
    '11-11':'Veterans Day','12-25':'Christmas Day','01-19':'Confederate Heroes Day',
    '03-02':'Texas Independence Day','04-21':'San Jacinto Day','08-27':'LBJ Birthday'};
  return names[ds.slice(5)]||'Holiday';
}

// ==================== AUDIT UTILS ====================
function getDevice() {
  const ua=navigator.userAgent;
  if(/iPhone|iPad|iPod/.test(ua))return 'iOS';
  if(/Android/.test(ua))return 'Android';
  if(/Windows/.test(ua))return 'Windows';
  if(/Mac/.test(ua))return 'Mac';
  return 'Browser';
}
function mkAuditEntry({empId,empName,actionType,originalValue,newValue,performedBy,isAdminEdit,reason,payrollPeriod}) {
  const meta=ACTION_META[actionType]||ACTION_META.SYSTEM_ENTRY;
  return {
    id:`${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    employeeId:empId, employeeName:empName,
    actionType, label:meta.category,
    date:getCTDateStr(), timestamp:Date.now(),

// ==================== TIMER LOGIC ====================
function getElapsedSec(t) {
  if(!t.isRunning&&!t.isPaused)return 0;
  const now=Date.now();
  if(t.isRunning)return Math.max(0,(now-t.clockInTime-(t.totalPausedMs||0))/1000);
  return Math.max(0,(t.pauseStartTime-t.clockInTime-(t.totalPausedMs||0))/1000);
}
function getTodaySec(t){return(t.todaySavedSec||0)+getElapsedSec(t);}
function getWeekSec(t){const wk=getCTWeekStr();return(t.weekSavedSec||0)+(t.lastWeek===wk?getElapsedSec(t):0);}
function getMonthSec(t){const mo=getCTMonthStr();return(t.monthSavedSec||0)+(t.lastMonth===mo?getElapsedSec(t):0);}
function getOTSec(t){return Math.max(0,getTodaySec(t)-OT_DAILY_SEC);}
function calcDailyEarnings(t) {
  if(!t.hourlyWage)return 0;
  if(t.wageType==='flat'){
    const today=getCTDateStr();
    const n=(t.sessions||[]).filter(s=>s.date===today).length+((t.isRunning||t.isPaused)&&t.lastDate===today?1:0);
    return n*t.hourlyWage;
  }
  return(getTodaySec(t)/3600)*t.hourlyWage;
}
function calcWeeklyEarnings(t) {
  if(!t.hourlyWage)return 0;
  if(t.wageType==='flat'){
    const wk=getCTWeekStr();
    const n=(t.sessions||[]).filter(s=>getCTWeekStr(new Date(s.date))===wk).length+((t.isRunning||t.isPaused)&&t.lastWeek===wk?1:0);
    return n*t.hourlyWage;
  }
  return(getWeekSec(t)/3600)*t.hourlyWage;
}
function calcMonthlyEarnings(t) {
  if(!t.hourlyWage)return 0;
  if(t.wageType==='flat'){
    const mo=getCTMonthStr();
    const n=(t.sessions||[]).filter(s=>s.date&&s.date.startsWith(mo)).length+((t.isRunning||t.isPaused)&&t.lastMonth===mo?1:0);
    return n*t.hourlyWage;
  }
  return(getMonthSec(t)/3600)*t.hourlyWage;
}
function calcEarnings(t,sec){
  if(!t.hourlyWage)return 0;
  if(t.wageType==='flat')return t.hourlyWage;
  return(sec/3600)*t.hourlyWage;
}
function getScheduleEndSec(t) {
  const dn=DAYS[getCTNow().getDay()];
  const s=t.assignedHours&&t.assignedHours[dn];
  if(!s)return null;
  return parseTimeSec(s.end);
}
function canClockIn(t) {
  if(t.isExempt)return{ok:true};
  const now=getCTNow();const ds=getCTDateStr(now);const dn=DAYS[now.getDay()];
  if(dn==='Saturday'||dn==='Sunday')return{ok:false,reason:'Office closed on weekends'};
  if(isHoliday(ds))return{ok:false,reason:'Office closed — '+getHolidayName(ds)};
  const sched=t.assignedHours&&t.assignedHours[dn];
  if(!sched)return{ok:false,reason:'No schedule assigned for today'};
  const nowSec=getNowSec();const startSec=parseTimeSec(sched.start);const endSec=parseTimeSec(sched.end);
  if(nowSec<startSec)return{ok:false,reason:`Shift opens at ${sched.start}`};
  if(nowSec>endSec)return{ok:false,reason:'Shift has ended for today'};
  return{ok:true};
}
function doCheckResets(t) {
  const ds=getCTDateStr();const wk=getCTWeekStr();const mo=getCTMonthStr();
  let u={...t};
  if(u.lastDate!==ds){u.todaySavedSec=0;u.lastDate=ds;}
  if(u.lastWeek!==wk){u.weekSavedSec=0;u.lastWeek=wk;}
  if(u.lastMonth!==mo){u.monthSavedSec=0;u.lastMonth=mo;}
  return u;
}
function doClockIn(t) {
  return{...t,isRunning:true,isPaused:false,clockInTime:Date.now(),pauseStartTime:null,
    totalPausedMs:0,lastDate:getCTDateStr(),lastWeek:getCTWeekStr(),lastMonth:getCTMonthStr(),otMode:t.otMode||'paid'};
}
function doPause(t) {
  if(!t.isRunning)return t;
  return{...t,isRunning:false,isPaused:true,pauseStartTime:Date.now()};
}
function doResume(t) {
  if(!t.isPaused)return t;
  const pms=Date.now()-t.pauseStartTime;
  return{...t,isRunning:true,isPaused:false,pauseStartTime:null,totalPausedMs:(t.totalPausedMs||0)+pms};
}
function doClockOut(t,mode) {
  const elapsed=getElapsedSec(t);
  const todayNew=(t.todaySavedSec||0)+elapsed;
  const wk=getCTWeekStr();const mo=getCTMonthStr();
  const weekNew=(t.weekSavedSec||0)+(t.lastWeek===wk?elapsed:0);
  const monthNew=(t.monthSavedSec||0)+(t.lastMonth===mo?elapsed:0);
  const otSec=Math.max(0,todayNew-OT_DAILY_SEC);
  let ptoCredits=t.ptoCredits||0;let ptoHours=t.ptoHours||0;
  if((mode||t.otMode)==='credits'&&otSec>0){
    const ec=Math.floor(otSec/3600);ptoCredits+=ec;
    const newPTOH=Math.floor(ptoCredits/30)*10;if(newPTOH>ptoHours)ptoHours=newPTOH;
  }
  const clockOutMs=Date.now();
  const breakSec=Math.max(0,Math.floor((clockOutMs-t.clockInTime)/1000)-Math.floor(elapsed));
  const session={date:getCTDateStr(),clockIn:t.clockInTime,clockOut:clockOutMs,seconds:elapsed,breakSec,overtimeSec:otSec,mode:mode||t.otMode||'paid'};
  return{...t,isRunning:false,isPaused:false,clockInTime:null,pauseStartTime:null,totalPausedMs:0,
    todaySavedSec:todayNew,weekSavedSec:weekNew,monthSavedSec:monthNew,ptoCredits,ptoHours,
    sessions:[...(t.sessions||[]).slice(-29),session],lastDate:getCTDateStr(),lastWeek:wk,lastMonth:mo};
}

// ==================== PAYROLL UTILS ====================
function calcPayrollForEmployee(timer, startDate, endDate) {
  const sessions=(timer.sessions||[]).filter(s=>s.date>=startDate&&s.date<=endDate);
  const breakSec=sessions.reduce((sum,s)=>sum+(s.breakSec||0),0);
  // Group by ISO week to compute OT per week
  const weekMap={};
  sessions.forEach(s=>{
    const wk=getCTWeekStr(new Date(s.date));
    weekMap[wk]=(weekMap[wk]||0)+(s.seconds||0);
  });
  let regularSec=0,overtimeSec=0;
  Object.values(weekMap).forEach(wkSec=>{
    if(timer.isExempt){regularSec+=wkSec;}
    else{regularSec+=Math.min(wkSec,OT_WEEKLY_SEC);overtimeSec+=Math.max(0,wkSec-OT_WEEKLY_SEC);}
  });
  let grossPay=0;
  if(timer.wageType==='flat'){
    grossPay=timer.hourlyWage; // flat rate per period (one value regardless of days)
  }else{
    grossPay=(regularSec/3600)*timer.hourlyWage+(overtimeSec/3600)*timer.hourlyWage*1.5;
  }
  return{sessions,regularSec,overtimeSec,breakSec,grossPay:Math.max(0,grossPay),sessionCount:sessions.length};
}
function mkPayrollEmployee(timer, startDate, endDate) {
  const calc=calcPayrollForEmployee(timer,startDate,endDate);
  return{employeeId:timer.id,employeeName:timer.name,title:timer.title,wageType:timer.wageType,
    hourlyWage:timer.hourlyWage,isExempt:timer.isExempt,...calc,
    deductions:[],adjustments:[],totalDeductions:0,totalAdjustments:0,
    finalPay:calc.grossPay,flatRateConfirmed:false};
}
function mkPayrollPeriod(timers, startDate, endDate) {
  return{id:Date.now().toString(),periodStart:startDate,periodEnd:endDate,status:'draft',
    generatedAt:Date.now(),approvedAt:null,approvedBy:null,lockedAt:null,paidAt:null,
    employees:timers.map(t=>mkPayrollEmployee(t,startDate,endDate))};
}
function recalcEmpFinalPay(emp){
  return Math.max(0,emp.grossPay-emp.totalDeductions+emp.totalAdjustments);
}
function payrollSummary(period) {
  if(!period)return{empCount:0,regularSec:0,overtimeSec:0,breakSec:0,grossPay:0,totalDeductions:0,totalAdjustments:0,finalPay:0};
  const e=period.employees;
  return{
    empCount:e.length,
    regularSec:e.reduce((s,x)=>s+x.regularSec,0),
    overtimeSec:e.reduce((s,x)=>s+x.overtimeSec,0),
    breakSec:e.reduce((s,x)=>s+x.breakSec,0),
    grossPay:e.reduce((s,x)=>s+x.grossPay,0),
    totalDeductions:e.reduce((s,x)=>s+x.totalDeductions,0),
    totalAdjustments:e.reduce((s,x)=>s+x.totalAdjustments,0),
    finalPay:e.reduce((s,x)=>s+x.finalPay,0),
  };
}
function exportPayrollCSV(period) {
  const headers=['Employee','Role','Pay Type','Rate','Regular Hrs','Break Time','OT Hrs','Gross Pay','Deductions','Adjustments','Final Pay','Status'];
  const rows=period.employees.map(e=>[
    e.employeeName,e.title,
    e.wageType==='flat'?'Flat Rate':e.isExempt?'Exempt':'Hourly',
    e.wageType==='flat'?`$${e.hourlyWage} flat`:`$${e.hourlyWage}/hr`,
    fmtHM(e.regularSec),fmtHM(e.breakSec),fmtHM(e.overtimeSec),
    e.grossPay.toFixed(2),e.totalDeductions.toFixed(2),e.totalAdjustments.toFixed(2),
    e.finalPay.toFixed(2),period.status.toUpperCase(),
  ]);
  const totals=payrollSummary(period);
  rows.push(['TOTALS','','','',fmtHM(totals.regularSec),fmtHM(totals.breakSec),fmtHM(totals.overtimeSec),
    totals.grossPay.toFixed(2),totals.totalDeductions.toFixed(2),totals.totalAdjustments.toFixed(2),totals.finalPay.toFixed(2),'']);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`payroll-${period.periodStart}-to-${period.periodEnd}.csv`;a.click();
}

function generatePayrollReport(timers) {
  const now=getCTNow();
  const ts=now.toLocaleString('en-US',{timeZone:TZ,weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
  let rpt=['╔══════════════════════════════════════════════════════════╗',
    '║       iTeam Legal Solutions – Employee Time Tracking     ║',
    '║                   PAYROLL / TIME REPORT                  ║',
    '╚══════════════════════════════════════════════════════════╝','',
    `  Generated: ${ts}`,`  Period: Week of ${getCTWeekStr()} | Month: ${getCTMonthStr()}`,'',
    '─'.repeat(62),''].join('\n');
  timers.forEach(t=>{
    const todaySec=getTodaySec(t);const weekSec=getWeekSec(t);const monthSec=getMonthSec(t);
    const otSec=getOTSec(t);const earnings=calcEarnings(t,todaySec);
    const status=t.isRunning?'● CLOCKED IN':t.isPaused?'◐ ON BREAK':'○ Clocked Out';
    rpt+=`  EMPLOYEE: ${t.name}\n  Title:    ${t.title}\n  Hire:     ${t.hireDate||'N/A'}    Exempt: ${t.isExempt?'Yes':'No'}\n`;
    rpt+=`  Status:   ${status}\n`;
    if(t.isRunning)rpt+=`  Clocked In Since: ${fmtTS(t.clockInTime)}\n`;
    rpt+=`\n  TODAY:    ${fmtHM(todaySec).padEnd(16)} (${fmtSec(todaySec)})\n`;
    rpt+=`  WEEK:     ${fmtHM(weekSec).padEnd(16)}\n  MONTH:    ${fmtHM(monthSec).padEnd(16)}\n`;
    if(otSec>0)rpt+=`  OVERTIME: ${fmtHM(otSec)} [${t.otMode==='credits'?'PTO Credits':'Paid OT'}]\n`;
    rpt+='\n';
    if(t.wageType==='flat'){rpt+=`  Rate:     ${fmtMoney(t.hourlyWage)} flat rate per shift\n`;}
    else{rpt+=`  Rate:     ${fmtMoney(t.hourlyWage)}/hr\n  Today's Earnings: ${fmtMoney(earnings)}\n`;}
    if(t.ptoCredits>0||t.ptoHours>0)rpt+=`  PTO Credits: ${t.ptoCredits} (${t.ptoHours}h available)\n`;
    const recent=(t.sessions||[]).filter(s=>s.date===getCTDateStr()).slice(-3);
    if(recent.length>0){rpt+=`  Today's Sessions:\n`;recent.forEach(s=>{rpt+=`    ${fmtTS(s.clockIn)} → ${fmtTS(s.clockOut)}  (${fmtHM(s.seconds)})\n`;});}
    rpt+=`\n  ${'─'.repeat(58)}\n\n`;
  });
  const totalWage=timers.reduce((sum,t)=>t.wageType!=='flat'?sum+calcEarnings(t,getTodaySec(t)):sum,0);
  rpt+=`  TODAY'S TOTAL WAGE COST (hourly staff): ${fmtMoney(totalWage)}\n`;
  rpt+=`  Total Staff Hours Today: ${fmtHM(timers.reduce((s,t)=>s+getTodaySec(t),0))}\n\n  [END OF REPORT]\n`;
  return rpt;
}

function PayrollPage({timers,auditLog,onAddAudit,payrollPeriods,onSavePeriod,onClose,onOpenAudit}) {
  const todayStr=getCTDateStr();
  const firstOfMonth=todayStr.slice(0,8)+'01';
  const [tab,setTab]=useState('current');
  const [periodStart,setPeriodStart]=useState(firstOfMonth);
  const [periodEnd,setPeriodEnd]=useState(todayStr);
  const [activePeriod,setActivePeriod]=useState(()=>payrollPeriods.find(p=>p.status==='draft')||null);
  const [expandedEmpId,setExpandedEmpId]=useState(null);
  const [deductModal,setDeductModal]=useState(null);
  const [showApprove,setShowApprove]=useState(false);
  const [histEmpId,setHistEmpId]=useState('all');

  const isLocked=activePeriod&&(activePeriod.status==='locked'||activePeriod.status==='paid'||activePeriod.status==='approved');

  function updatePeriod(updated) {
    setActivePeriod(updated);
    onSavePeriod(updated);
  }

  function generatePayroll() {
    if(!periodStart||!periodEnd)return;
    const period=mkPayrollPeriod(timers,periodStart,periodEnd);
    updatePeriod(period);
    onAddAudit(mkAuditEntry({empId:-1,empName:'All Employees',actionType:'SYSTEM_ENTRY',
      newValue:`Payroll generated ${periodStart} → ${periodEnd}`,performedBy:'Administrator',isAdminEdit:true}));
  }

  function handleDeductSave(empId,type,item) {
    if(!activePeriod)return;
    const emp=activePeriod.employees.find(e=>e.employeeId===empId);if(!emp)return;
    const key=type==='deduction'?'deductions':'adjustments';
    const totKey=type==='deduction'?'totalDeductions':'totalAdjustments';
    const newList=[...emp[key],item];
    const newTot=newList.reduce((s,d)=>s+d.amount,0);
    const updated={...activePeriod,employees:activePeriod.employees.map(e=>{
      if(e.employeeId!==empId)return e;
      const ne={...e,[key]:newList,[totKey]:newTot};
      ne.finalPay=recalcEmpFinalPay(ne);return ne;
    })};
    updatePeriod(updated);
    onAddAudit(mkAuditEntry({empId,empName:emp.employeeName,actionType:'ADMIN_CORRECTION',
      newValue:`${type==='deduction'?'Deduction':'Adjustment'}: ${item.desc} = ${fmtMoney(item.amount)}`,
      performedBy:'Administrator',isAdminEdit:true,reason:item.reason}));
    setDeductModal(null);
  }

  function removeDeductAdj(empId,type,itemId) {
    if(!activePeriod||isLocked)return;
    const emp=activePeriod.employees.find(e=>e.employeeId===empId);if(!emp)return;
    const key=type==='deduction'?'deductions':'adjustments';
    const totKey=type==='deduction'?'totalDeductions':'totalAdjustments';
    const item=emp[key].find(x=>x.id===itemId);
    const newList=emp[key].filter(x=>x.id!==itemId);
    const newTot=newList.reduce((s,d)=>s+d.amount,0);
    const updated={...activePeriod,employees:activePeriod.employees.map(e=>{
      if(e.employeeId!==empId)return e;
      const ne={...e,[key]:newList,[totKey]:newTot};ne.finalPay=recalcEmpFinalPay(ne);return ne;
    })};
    updatePeriod(updated);
    onAddAudit(mkAuditEntry({empId,empName:emp.employeeName,actionType:'ADMIN_CORRECTION',
      originalValue:`${type==='deduction'?'Deduction':'Adjustment'} removed: ${item?item.desc:itemId}`,
      performedBy:'Administrator',isAdminEdit:true,reason:'Item removed by admin'}));
  }

  function advanceStatus(newStatus) {
    if(!activePeriod)return;
    const now=Date.now();
    const updated={...activePeriod,status:newStatus,
      ...(newStatus==='approved'?{approvedAt:now,approvedBy:'Alonzo Fuller'}:{}),
      ...(newStatus==='locked'?{lockedAt:now}:{}),
      ...(newStatus==='paid'?{paidAt:now}:{}),
    };
    updatePeriod(updated);
    const actionMap={review:'Submitted for Review',approved:'Payroll Approved',locked:'Payroll Period Locked',paid:'Payroll Marked as Paid'};
    onAddAudit(mkAuditEntry({empId:-1,empName:'All Employees',actionType:'PAYROLL_LOCKED',
      newValue:`${actionMap[newStatus]||newStatus} — ${activePeriod.periodStart} to ${activePeriod.periodEnd}`,
      performedBy:'Alonzo Fuller',isAdminEdit:true}));
    setShowApprove(false);
  }

  function loadHistoryPeriod(p) {
    setActivePeriod(p);setPeriodStart(p.periodStart);setPeriodEnd(p.periodEnd);setTab('current');
  }

  const sum=payrollSummary(activePeriod);
  const periodAudit=activePeriod?auditLog.filter(e=>e.payrollPeriod===activePeriod.periodStart||e.date>=activePeriod.periodStart&&e.date<=activePeriod.periodEnd):[];

  return(
    <div className="payroll-page-wrap">
      {/* Page Header */}
      <div className="payroll-page-header">
        <button className="btn btn-outline btn-sm" onClick={onClose}>← Back to Clock</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:'1.1rem',fontWeight:700,letterSpacing:'.5px'}}>Office Payroll</div>
          <div style={{fontSize:'.68rem',color:'var(--gold2)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:2}}>iTeam Legal Solutions</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline btn-sm" onClick={onOpenAudit}>🔒 Audit Log</button>
          {activePeriod&&<button className="btn btn-outline btn-sm" onClick={()=>exportPayrollCSV(activePeriod)}>📊 CSV</button>}
          {activePeriod&&<button className="btn btn-outline btn-sm" onClick={()=>window.print()}>🖨 Print</button>}
        </div>
      </div>

      <div className="payroll-page-main">
        {/* Tab bar */}
        <div className="pr-tab-bar">
          <button className={`pr-tab${tab==='current'?' active':''}`} onClick={()=>setTab('current')}>Current Payroll</button>
          <button className={`pr-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>Payroll History</button>
          <button className={`pr-tab${tab==='audit'?' active':''}`} onClick={()=>setTab('audit')}>Payroll Audit Trail</button>
        </div>

        {/* ── CURRENT PAYROLL TAB ── */}
        {tab==='current'&&(
          <>
            {/* Period Selector */}
            <div className="period-selector">
              <div><span className="period-label">Pay Period Start</span><input type="date" className="period-input" value={periodStart} onChange={e=>setPeriodStart(e.target.value)} disabled={!!isLocked} /></div>
              <div><span className="period-label">Pay Period End</span><input type="date" className="period-input" value={periodEnd} onChange={e=>setPeriodEnd(e.target.value)} disabled={!!isLocked} /></div>
              <button className="btn btn-navy" onClick={generatePayroll} disabled={!periodStart||!periodEnd||!!isLocked}>⚡ Generate Payroll</button>
              {activePeriod&&<div style={{marginLeft:8}}><StatusPill status={activePeriod.status} /></div>}
              {activePeriod&&activePeriod.approvedAt&&<div style={{fontSize:'.72rem',color:'var(--gray)'}}>Approved {fmtTS(activePeriod.approvedAt)} by {activePeriod.approvedBy}</div>}
              {activePeriod&&activePeriod.paidAt&&<div style={{fontSize:'.72rem',color:'#075985',fontWeight:700}}>Paid {fmtTS(activePeriod.paidAt)}</div>}
            </div>

            {activePeriod&&(
              <>
                {/* Summary Cards */}
                <div className="summary-grid">
                  <SummaryCard label="Employees" value={sum.empCount} />
                  <SummaryCard label="Regular Hours" value={fmtHM(sum.regularSec)} />
                  <SummaryCard label="Overtime Hours" value={fmtHM(sum.overtimeSec)} color="red" />
                  <SummaryCard label="Break Time" value={fmtHM(sum.breakSec)} />
                  <SummaryCard label="Gross Payroll" value={fmtMoney(sum.grossPay)} color="gold" />
                  <SummaryCard label="Deductions" value={fmtMoney(sum.totalDeductions)} color="red" />
                  <SummaryCard label="Adjustments" value={fmtMoney(sum.totalAdjustments)} color="green" />
                  <SummaryCard label="Final Payroll Owed" value={fmtMoney(sum.finalPay)} color="green" />
                </div>

                {/* Employee Payroll Table */}
                <div className="pr-table-wrap">
                  <table className="pr-table">
                    <thead>
                      <tr>
                        <th>Employee</th><th>Pay Type</th><th>Rate</th>
                        <th>Regular Hrs</th><th>Break Time</th><th>OT Hrs</th>
                        <th>Gross Pay</th><th>Deductions</th><th>Adjustments</th><th>Final Pay</th>
                        {!isLocked&&<th>Actions</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {activePeriod.employees.map(e=>{
                        const isExp=expandedEmpId===e.employeeId;
                        return(
                          <React.Fragment key={e.employeeId}>
                            <tr className={`pr-emp-row${isExp?' expanded':''}`} onClick={()=>setExpandedEmpId(isExp?null:e.employeeId)}>
                              <td><div style={{fontWeight:700,color:'var(--navy)',fontSize:'.82rem'}}>{e.employeeName}</div><div style={{fontSize:'.68rem',color:'var(--gray)'}}>{e.title}</div></td>
                              <td style={{fontSize:'.75rem'}}>{e.wageType==='flat'?'Flat Rate':e.isExempt?'Exempt':'Hourly'}</td>
                              <td style={{fontSize:'.75rem'}}>{e.wageType==='flat'?fmtMoney(e.hourlyWage)+'/period':fmtMoney(e.hourlyWage)+'/hr'}</td>
                              <td>{fmtHM(e.regularSec)}</td>
                              <td style={{color:'var(--gray)',fontSize:'.75rem'}}>{fmtHM(e.breakSec)}</td>
                              <td style={{color:e.overtimeSec>0?'var(--red)':'#d1d5db',fontWeight:e.overtimeSec>0?700:400}}>{fmtHM(e.overtimeSec)}</td>
                              <td style={{fontWeight:600}}>{fmtMoney(e.grossPay)}</td>
                              <td style={{color:e.totalDeductions>0?'var(--red)':'#d1d5db'}}>{e.totalDeductions>0?'-'+fmtMoney(e.totalDeductions):'—'}</td>
                              <td style={{color:e.totalAdjustments>0?'#0d6c2f':'#d1d5db'}}>{e.totalAdjustments>0?'+'+fmtMoney(e.totalAdjustments):'—'}</td>
                              <td style={{fontWeight:700,color:'#0d6c2f'}}>{fmtMoney(e.finalPay)}</td>
                              {!isLocked&&<td onClick={ev=>ev.stopPropagation()}>
                                <div style={{display:'flex',gap:4}}>
                                  <button className="btn btn-red btn-xs" onClick={()=>setDeductModal({empId:e.employeeId,type:'deduction'})}>− Deduct</button>
                                  <button className="btn btn-green btn-xs" onClick={()=>setDeductModal({empId:e.employeeId,type:'adjustment'})}>+ Adjust</button>
                                </div>
                              </td>}
                            </tr>
                            {isExp&&(
                              <tr className="pr-expand-row">
                                <td colSpan={isLocked?10:11}>
                                  <div className="pr-expand-inner">
                                    <div className="pr-expand-section">
                                      <div className="pr-expand-title">Time Breakdown ({e.sessionCount} session{e.sessionCount!==1?'s':''})</div>
                                      {[['Regular Hours',fmtHM(e.regularSec)],['Overtime Hours',fmtHM(e.overtimeSec)],['Break Time',fmtHM(e.breakSec)],['Total Logged',(()=>{const sec=(e.regularSec||0)+(e.overtimeSec||0);return fmtHM(sec);})()]].map(([l,v])=>(
                                        <div key={l} className="pr-expand-row2"><span style={{color:'var(--gray)'}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>
                                      ))}
                                      <div style={{marginTop:10}}>
                                        <div className="pr-expand-title">Pay Calculation</div>
                                        {e.wageType==='flat'?<div className="pr-expand-row2"><span>Flat rate</span><span style={{fontWeight:700}}>{fmtMoney(e.grossPay)}</span></div>:(
                                          <>
                                            <div className="pr-expand-row2"><span>Regular ({fmtHM(e.regularSec)} × {fmtMoney(e.hourlyWage)}/hr)</span><span>{fmtMoney((e.regularSec/3600)*e.hourlyWage)}</span></div>
                                            {e.overtimeSec>0&&<div className="pr-expand-row2"><span>OT ({fmtHM(e.overtimeSec)} × {fmtMoney(e.hourlyWage*1.5)}/hr)</span><span style={{color:'var(--red)'}}>{fmtMoney((e.overtimeSec/3600)*e.hourlyWage*1.5)}</span></div>}
                                            <div className="pr-expand-row2" style={{borderTop:'2px solid #e2e8f0',marginTop:4,paddingTop:4}}><span style={{fontWeight:700}}>Gross Pay</span><span style={{fontWeight:700}}>{fmtMoney(e.grossPay)}</span></div>
                                          </>
                                        )}
                                      </div>
                                    </div>
                                    <div className="pr-expand-section">
                                      <div className="pr-expand-title">Deductions {!isLocked&&<button className="btn btn-red btn-xs" style={{marginLeft:6}} onClick={()=>setDeductModal({empId:e.employeeId,type:'deduction'})}>+ Add</button>}</div>
                                      {e.deductions.length===0?<div style={{color:'var(--gray)',fontStyle:'italic',fontSize:'.75rem'}}>None</div>:e.deductions.map(d=>(
                                        <div key={d.id} className="deduct-item"><div><span style={{fontWeight:600}}>{d.desc}</span><div style={{fontSize:'.68rem',color:'var(--gray)'}}>{d.reason}</div></div><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{color:'var(--red)',fontWeight:700}}>-{fmtMoney(d.amount)}</span>{!isLocked&&<button onClick={()=>removeDeductAdj(e.employeeId,'deduction',d.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'.7rem'}}>✕</button>}</div></div>
                                      ))}
                                      <div style={{height:12}}/>
                                      <div className="pr-expand-title">Adjustments {!isLocked&&<button className="btn btn-green btn-xs" style={{marginLeft:6}} onClick={()=>setDeductModal({empId:e.employeeId,type:'adjustment'})}>+ Add</button>}</div>
                                      {e.adjustments.length===0?<div style={{color:'var(--gray)',fontStyle:'italic',fontSize:'.75rem'}}>None</div>:e.adjustments.map(a=>(
                                        <div key={a.id} className="deduct-item"><div><span style={{fontWeight:600}}>{a.desc}</span><div style={{fontSize:'.68rem',color:'var(--gray)'}}>{a.reason}</div></div><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{color:'#0d6c2f',fontWeight:700}}>+{fmtMoney(a.amount)}</span>{!isLocked&&<button onClick={()=>removeDeductAdj(e.employeeId,'adjustment',a.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'.7rem'}}>✕</button>}</div></div>
                                      ))}
                                      <div style={{height:12}}/>
                                      <div className="pr-expand-row2" style={{borderTop:'2px solid var(--navy)',paddingTop:6}}><span style={{fontWeight:700,color:'var(--navy)'}}>Final Pay</span><span style={{fontWeight:700,color:'#0d6c2f',fontSize:'1rem'}}>{fmtMoney(e.finalPay)}</span></div>
                                    </div>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                      {/* Totals row */}
                      <tr style={{background:'var(--navy)'}}>
                        <td colSpan={3} style={{color:'#fff',fontWeight:700,fontSize:'.8rem',padding:'10px 11px'}}>TOTALS</td>
                        <td style={{color:'var(--gold2)',fontWeight:700}}>{fmtHM(sum.regularSec)}</td>
                        <td style={{color:'rgba(255,255,255,.6)'}}>{fmtHM(sum.breakSec)}</td>
                        <td style={{color:'#fca5a5',fontWeight:700}}>{fmtHM(sum.overtimeSec)}</td>
                        <td style={{color:'#fff',fontWeight:700}}>{fmtMoney(sum.grossPay)}</td>
                        <td style={{color:'#fca5a5',fontWeight:700}}>{sum.totalDeductions>0?'-'+fmtMoney(sum.totalDeductions):'—'}</td>
                        <td style={{color:'#86efac',fontWeight:700}}>{sum.totalAdjustments>0?'+'+fmtMoney(sum.totalAdjustments):'—'}</td>
                        <td style={{color:'#86efac',fontWeight:700,fontSize:'.9rem'}}>{fmtMoney(sum.finalPay)}</td>
                        {!isLocked&&<td></td>}
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* Action Bar */}
                <div className="pr-action-bar">
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                    {activePeriod.status==='draft'&&<button className="btn btn-navy" onClick={()=>advanceStatus('review')}>📋 Submit for Review</button>}
                    {activePeriod.status==='review'&&<button className="btn btn-green" onClick={()=>setShowApprove(true)}>✅ Approve Payroll</button>}
                    {activePeriod.status==='approved'&&<button className="btn btn-purple" onClick={()=>advanceStatus('locked')}>🔒 Lock Payroll</button>}
                    {activePeriod.status==='locked'&&<button className="btn btn-navy" onClick={()=>advanceStatus('paid')}>💳 Mark as Paid</button>}
                    {activePeriod.status==='paid'&&<span style={{color:'#075985',fontWeight:700,fontSize:'.85rem'}}>✓ Payroll Complete — Paid {fmtTS(activePeriod.paidAt)}</span>}
                    <button className="btn btn-gray btn-sm" onClick={onOpenAudit}>🔒 View Audit Log</button>
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <button className="btn btn-gray btn-sm" onClick={()=>window.print()}>🖨 Print Payroll</button>
                    <button className="btn btn-gray btn-sm" onClick={()=>exportPayrollCSV(activePeriod)}>📊 Download CSV</button>
                    {!isLocked&&<button className="btn btn-gold btn-sm" onClick={()=>onSavePeriod(activePeriod)}>💾 Save Draft</button>}
                  </div>
                </div>
              </>
            )}

            {!activePeriod&&(
              <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:'40px',textAlign:'center',color:'var(--gray)'}}>
                <div style={{fontSize:'2rem',marginBottom:12}}>📊</div>
                <div style={{fontWeight:700,color:'var(--navy)',fontSize:'1rem',marginBottom:8}}>No payroll generated yet</div>
                <div style={{fontSize:'.82rem'}}>Select a pay period above and click <strong>Generate Payroll</strong> to calculate employee wages.</div>
              </div>
            )}
          </>
        )}

        {/* ── HISTORY TAB ── */}
        {tab==='history'&&(
          <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
            <div style={{background:'var(--navy)',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'#fff',fontWeight:700,fontSize:'.9rem'}}>Payroll History</span>
              <span style={{color:'rgba(255,255,255,.6)',fontSize:'.75rem'}}>{payrollPeriods.length} period{payrollPeriods.length!==1?'s':''}</span>
            </div>
            {payrollPeriods.length===0?(
              <div style={{padding:40,textAlign:'center',color:'var(--gray)',fontStyle:'italic'}}>No payroll history yet.</div>
            ):(
              <table className="history-table">
                <thead><tr><th>Period</th><th>Employees</th><th>Regular Hrs</th><th>OT Hrs</th><th>Gross Pay</th><th>Deductions</th><th>Final Pay</th><th>Status</th><th>Generated</th></tr></thead>
                <tbody>
                  {payrollPeriods.slice().reverse().map(p=>{const s=payrollSummary(p);return(
                    <tr key={p.id} onClick={()=>loadHistoryPeriod(p)}>
                      <td><strong style={{color:'var(--navy)'}}>{p.periodStart}</strong><span style={{color:'var(--gray)'}}> → {p.periodEnd}</span></td>
                      <td>{s.empCount}</td>
                      <td>{fmtHM(s.regularSec)}</td>
                      <td style={{color:s.overtimeSec>0?'var(--red)':undefined}}>{fmtHM(s.overtimeSec)}</td>
                      <td style={{fontWeight:600}}>{fmtMoney(s.grossPay)}</td>
                      <td style={{color:'var(--red)'}}>{s.totalDeductions>0?'-'+fmtMoney(s.totalDeductions):'—'}</td>
                      <td style={{fontWeight:700,color:'#0d6c2f'}}>{fmtMoney(s.finalPay)}</td>
                      <td><StatusPill status={p.status} /></td>
                      <td style={{fontSize:'.72rem',color:'var(--gray)'}}>{fmtTS(p.generatedAt)}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            )}
          </div>
        )}

        {/* ── PAYROLL AUDIT TRAIL TAB ── */}
        {tab==='audit'&&(
          <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
            <div style={{background:'var(--navy)',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'#fff',fontWeight:700,fontSize:'.9rem'}}>Payroll Audit Trail</span>
              <span style={{color:'rgba(255,255,255,.6)',fontSize:'.75rem'}}>{auditLog.filter(e=>['PAYROLL_LOCKED','ADMIN_CORRECTION'].includes(e.actionType)).length} entries</span>
            </div>
            <div style={{overflowX:'auto',padding:'0 20px 20px'}}>
              <table className="audit-table" style={{marginTop:12}}>
                <thead><tr><th>Timestamp</th><th>Employee</th><th>Action</th><th>Category</th><th>Performed By</th><th>Change</th><th>Reason</th><th>Period</th></tr></thead>
                <tbody>
                  {auditLog.filter(e=>['PAYROLL_LOCKED','ADMIN_CORRECTION','SYSTEM_ENTRY'].includes(e.actionType)).slice().reverse().map(e=>(
                    <tr key={e.id}>
                      <td style={{fontFamily:'monospace',fontSize:'.72rem',whiteSpace:'nowrap'}}>{fmtTSFull(e.timestamp)}</td>
                      <td style={{fontWeight:700,color:'var(--navy)',fontSize:'.78rem'}}>{e.employeeName}</td>
                      <td><ActionBadge actionType={e.actionType} /></td>
                      <td style={{fontSize:'.72rem'}}>{e.label}</td>
                      <td style={{fontSize:'.75rem'}}>{e.performedBy}{e.isAdminEdit&&<div style={{fontSize:'.65rem',color:'#854d0e',fontWeight:700}}>ADMIN</div>}</td>
                      <td style={{fontSize:'.72rem',color:'var(--navy)'}}>{e.newValue||'—'}</td>
                      <td style={{fontSize:'.72rem',color:e.reason?'#b45309':'var(--gray)',fontStyle:e.reason?'normal':'italic'}}>{e.reason||'—'}</td>
                      <td style={{fontSize:'.68rem',color:'var(--gray)'}}>{e.payrollPeriod}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* Payroll Modals */}
      {deductModal&&(()=>{const emp=activePeriod.employees.find(e=>e.employeeId===deductModal.empId);return emp&&<DeductionAdjustModal type={deductModal.type} emp={emp} onSave={item=>handleDeductSave(deductModal.empId,deductModal.type,item)} onClose={()=>setDeductModal(null)} />;})()}
      {showApprove&&activePeriod&&<ApproveConfirmModal period={activePeriod} onConfirm={()=>advanceStatus('approved')} onClose={()=>setShowApprove(false)} />}
    </div>
  );
}

function AddEmployeeModal({onSave,onClose}) {
  const [name,setName]=useState('');
  const [title,setTitle]=useState('');
  const [payType,setPayType]=useState('hourly');
  const [rate,setRate]=useState('');
  const [hireDate,setHireDate]=useState('');
  const [isOwner,setIsOwner]=useState(false);
  const canSave=name.trim().length>=2&&rate!==''&&parseFloat(rate)>=0;
  return(
    <div className="modal-overlay">
      <div className="modal" style={{maxWidth:480}}>
        <div className="modal-header">
          <span className="modal-title">+ Add Employee</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="correction-field">
            <span className="correction-label">Employee Name <span style={{color:'var(--red)'}}>*</span></span>
            <input className="correction-input" placeholder="Full name" value={name} onChange={e=>setName(e.target.value)} autoFocus />
          </div>
          <div className="correction-field">
            <span className="correction-label">Role / Title</span>
            <input className="correction-input" placeholder="e.g. Legal Assistant, Intern…" value={title} onChange={e=>setTitle(e.target.value)} />
          </div>
          <div className="correction-field">
            <span className="correction-label">Pay Type</span>
            <select className="correction-input" value={payType} onChange={e=>setPayType(e.target.value)}>
              <option value="hourly">Hourly Rate</option>
              <option value="flat">Flat Shift Rate</option>
            </select>
          </div>
          <div className="correction-field">
            <span className="correction-label">{payType==='flat'?'Flat Rate per Shift ($)':'Hourly Rate ($/hr)'} <span style={{color:'var(--red)'}}>*</span></span>
            <input className="correction-input" type="number" min="0" step="0.01" placeholder="0.00" value={rate} onChange={e=>setRate(e.target.value)} />
          </div>
          <div className="correction-field">
            <span className="correction-label">Hire Date</span>
            <input className="correction-input" type="date" value={hireDate} onChange={e=>setHireDate(e.target.value)} />
          </div>
          <div className="correction-field">
            <span className="correction-label">Staff Type</span>
            <div style={{display:'flex',gap:20,marginTop:6}}>
              <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontWeight:600,fontSize:'.85rem',color:!isOwner?'var(--navy)':'var(--gray)'}}>
                <input type="radio" name="addEmpType" checked={!isOwner} onChange={()=>setIsOwner(false)} style={{accentColor:'var(--navy)',width:15,height:15}} />
                Staff (included in payroll)
              </label>
              <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',fontWeight:600,fontSize:'.85rem',color:isOwner?'#7c3aed':'var(--gray)'}}>
                <input type="radio" name="addEmpType" checked={isOwner} onChange={()=>setIsOwner(true)} style={{accentColor:'#7c3aed',width:15,height:15}} />
                Owner (separate tracking)
              </label>
            </div>
            {!isOwner&&<div style={{fontSize:'.72rem',color:'var(--gray)',marginTop:5}}>This employee's hours will count toward Staff Payroll totals and the weekly cap.</div>}
            {isOwner&&<div style={{fontSize:'.72rem',color:'#7c3aed',marginTop:5}}>Owner hours are shown separately and excluded from Staff Payroll cap calculations.</div>}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-gray" onClick={onClose}>Cancel</button>
          <button className="btn btn-navy" disabled={!canSave} onClick={()=>onSave({name:name.trim(),title:title.trim(),payType,rate:parseFloat(rate)||0,hireDate,isOwner})}>
            Save Employee
          </button>
        </div>
      </div>
    </div>
  );
}

function AddEmployeeCard({onClick}) {
  return(
    <div className="add-emp-card" onClick={onClick}>
      <div className="add-emp-icon">+</div>
      <div className="add-emp-text">Add Employee</div>
      <div className="add-emp-sub">Click to add a new team member to the dashboard</div>
    </div>
  );
}

function InactiveStaffSection({timers,onReactivate}) {
  const [expanded,setExpanded]=useState(false);
  if(!timers||timers.length===0)return null;
  return(
    <div style={{marginBottom:24}}>
      <div className="inactive-section-header" onClick={()=>setExpanded(!expanded)}>
        <div className="section-title" style={{marginBottom:0}}>Inactive Staff ({timers.length})</div>
        <span style={{fontSize:'.78rem',color:'var(--gray)',fontWeight:600,marginLeft:8}}>{expanded?'▲ Hide':'▼ Show'}</span>
      </div>
      {expanded&&(
        <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',overflow:'hidden',marginTop:10}}>
          {timers.map(t=>(
            <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 18px',borderBottom:'1px solid #f1f5f9'}}>
              <div>
                <div style={{fontWeight:700,color:'var(--navy)',fontSize:'.88rem'}}>{t.name}</div>
                <div style={{fontSize:'.72rem',color:'var(--gray)'}}>
                  {t.title||'No title'} &nbsp;·&nbsp;
                  {t.wageType==='flat'?fmtMoney(t.hourlyWage)+'/shift':fmtMoney(t.hourlyWage)+'/hr'} &nbsp;·&nbsp;
                  {t.isOwner?'Owner':'Staff'}
                </div>
              </div>
              <button className="btn btn-green btn-sm" onClick={()=>onReactivate(t.id)}>Reactivate</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
